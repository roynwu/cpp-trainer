<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>C++ Quant Trainer</title>
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="C++ Trainer">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<style>
:root {
  --bg: #0f1117;
  --bg2: #171a23;
  --card: #1e222e;
  --card2: #262b3a;
  --border: #2f3547;
  --text: #e8eaf0;
  --muted: #9aa1b5;
  --green: #58cc02;
  --green-dark: #46a302;
  --red: #ff4b4b;
  --gold: #ffc800;
  --blue: #1cb0f6;
  --purple: #ce82ff;
  --radius: 16px;
  --mono: "SF Mono", "Menlo", "Consolas", monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  min-height: 100vh;
  padding-bottom: 90px;
}
.app { max-width: 640px; margin: 0 auto; padding: 16px; }

/* ---------- Header ---------- */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 4px 16px;
}
.header .logo { font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
.logo span { color: var(--green); }
.stats { display: flex; gap: 14px; align-items: center; }
.stat { display: flex; align-items: center; gap: 5px; font-weight: 700; font-size: 15px; }
.stat.streak { color: var(--gold); }
.stat.xp { color: var(--blue); }

/* ---------- Cards ---------- */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
}
.card h2 { font-size: 18px; margin-bottom: 8px; }
.card h3 { font-size: 15px; margin: 12px 0 6px; }
.muted { color: var(--muted); font-size: 14px; line-height: 1.5; }
.tag {
  display: inline-block; font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--purple); background: rgba(206,130,255,0.12);
  padding: 3px 10px; border-radius: 20px; margin-bottom: 10px;
}
.tag.green { color: var(--green); background: rgba(88,204,2,0.12); }
.tag.blue { color: var(--blue); background: rgba(28,176,246,0.12); }
.tag.gold { color: var(--gold); background: rgba(255,200,0,0.12); }

/* ---------- Level bar ---------- */
.levelbar { margin: 10px 0 4px; }
.levelbar .names { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.levelbar .names .current { color: var(--green); font-weight: 700; }
.progress-track { background: var(--bg2); border-radius: 20px; height: 14px; overflow: hidden; }
.progress-fill { background: linear-gradient(90deg, var(--green-dark), var(--green)); height: 100%; border-radius: 20px; transition: width 0.6s ease; }

/* ---------- Question ---------- */
.question-text { font-size: 17px; font-weight: 600; line-height: 1.45; margin-bottom: 16px; }
.question-text code, .explain code, .lesson-body code, li code {
  font-family: var(--mono); font-size: 0.88em; background: var(--bg2);
  padding: 1px 6px; border-radius: 6px; color: #ffd479;
}
.choices { display: flex; flex-direction: column; gap: 10px; }
.choice {
  display: flex; align-items: flex-start; gap: 12px;
  background: var(--card2); border: 2px solid var(--border); border-radius: 14px;
  padding: 14px 16px; cursor: pointer; text-align: left; width: 100%;
  color: var(--text); font-size: 15px; line-height: 1.4; font-family: inherit;
  transition: border-color 0.15s, transform 0.05s;
}
.choice:active { transform: scale(0.99); }
.choice:hover { border-color: #4a5268; }
.choice .letter {
  flex-shrink: 0; width: 26px; height: 26px; border-radius: 8px; background: var(--bg2);
  display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; color: var(--muted);
}
.choice.correct { border-color: var(--green); background: rgba(88,204,2,0.10); }
.choice.correct .letter { background: var(--green); color: #08210a; }
.choice.wrong { border-color: var(--red); background: rgba(255,75,75,0.10); }
.choice.wrong .letter { background: var(--red); color: #fff; }
.choice.dim { opacity: 0.45; pointer-events: none; }
.choice:disabled { cursor: default; }
.explain {
  margin-top: 14px; padding: 14px 16px; border-radius: 12px; font-size: 14px; line-height: 1.55;
  animation: slideup 0.25s ease;
}
.explain.good { background: rgba(88,204,2,0.10); border: 1px solid rgba(88,204,2,0.35); }
.explain.bad { background: rgba(255,75,75,0.10); border: 1px solid rgba(255,75,75,0.35); }
.explain .verdict { font-weight: 800; margin-bottom: 4px; }
.explain.good .verdict { color: var(--green); }
.explain.bad .verdict { color: var(--red); }
@keyframes slideup { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ---------- Buttons ---------- */
.btn {
  display: inline-block; background: var(--green); color: #08210a; font-weight: 800;
  border: none; border-radius: 14px; padding: 14px 24px; font-size: 15px; cursor: pointer;
  font-family: inherit; width: 100%; margin-top: 14px;
  box-shadow: 0 4px 0 var(--green-dark); transition: transform 0.05s;
}
.btn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--green-dark); }
.btn.secondary { background: var(--card2); color: var(--text); box-shadow: 0 4px 0 var(--bg2); border: 1px solid var(--border); }
.btn.small { width: auto; padding: 10px 18px; font-size: 13px; margin-top: 0; }
.btn:disabled { opacity: 0.5; cursor: default; }

/* ---------- XP toast ---------- */
.toast {
  position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
  background: var(--gold); color: #3a2c00; font-weight: 800; padding: 10px 22px;
  border-radius: 30px; z-index: 100; animation: toastin 0.3s ease; box-shadow: 0 6px 24px rgba(0,0,0,0.4);
}
@keyframes toastin { from { opacity: 0; transform: translate(-50%, -16px); } to { opacity: 1; transform: translate(-50%, 0); } }

/* ---------- Tabs ---------- */
.tabbar {
  position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2);
  border-top: 1px solid var(--border); display: flex; justify-content: space-around;
  padding: 8px 0 max(10px, env(safe-area-inset-bottom)); z-index: 50;
}
.tab {
  background: none; border: none; color: var(--muted); font-family: inherit;
  font-size: 11px; font-weight: 700; cursor: pointer; display: flex; flex-direction: column;
  align-items: center; gap: 3px; padding: 4px 10px; border-radius: 10px;
}
.tab .icon { font-size: 20px; }
.tab.active { color: var(--green); }

/* ---------- Lessons list ---------- */
.week-label { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 18px 4px 8px; }
.lesson-row {
  display: flex; align-items: center; gap: 14px; background: var(--card);
  border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 8px;
  cursor: pointer; width: 100%; color: var(--text); font-family: inherit; text-align: left;
}
.lesson-row:hover { border-color: #4a5268; }
.lesson-row .num {
  flex-shrink: 0; width: 34px; height: 34px; border-radius: 50%; background: var(--card2);
  display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; color: var(--muted);
  border: 2px solid var(--border);
}
.lesson-row.done .num { background: var(--green); color: #08210a; border-color: var(--green); }
.lesson-row .info { flex: 1; }
.lesson-row .title { font-weight: 700; font-size: 14px; }
.lesson-row .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.lesson-body { font-size: 15px; line-height: 1.65; }
.lesson-body p { margin-bottom: 12px; }
.lesson-body pre {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 14px; overflow-x: auto; font-family: var(--mono); font-size: 12.5px;
  line-height: 1.5; margin-bottom: 12px; color: #d8dce8;
}
.lesson-body pre code { background: none; padding: 0; color: inherit; }
.keypoints { margin: 8px 0 12px 0; padding-left: 20px; }
.keypoints li { margin-bottom: 8px; font-size: 14px; line-height: 1.5; }
.backlink { color: var(--blue); background: none; border: none; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; padding: 0; margin-bottom: 14px; display: inline-block; }

/* ---------- Misc ---------- */
.bignum { font-size: 34px; font-weight: 800; }
.row2 { display: flex; gap: 12px; }
.row2 .card { flex: 1; margin-bottom: 16px; text-align: center; }
.empty { text-align: center; padding: 40px 16px; color: var(--muted); }
.empty .big { font-size: 40px; margin-bottom: 10px; }
.pill-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.pill { font-size: 12px; font-weight: 700; background: var(--card2); border: 1px solid var(--border); border-radius: 20px; padding: 6px 12px; color: var(--muted); }
.combo-badge { color: var(--gold); font-weight: 800; font-size: 13px; margin-left: 8px; }
.topic-select { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
.topic-btn {
  font-size: 13px; font-weight: 700; background: var(--card2); border: 1px solid var(--border);
  border-radius: 20px; padding: 8px 14px; color: var(--muted); cursor: pointer; font-family: inherit;
}
.topic-btn.active { background: rgba(88,204,2,0.15); border-color: var(--green); color: var(--green); }
.reset-link { color: var(--muted); background: none; border: none; font-family: inherit; font-size: 12px; cursor: pointer; text-decoration: underline; margin-top: 20px; }
.deepdive { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; margin-top: 14px; }
.deepdive .dd-head { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; color: var(--blue); margin-bottom: 4px; }
.deepdive .dd-note { font-size: 13px; color: var(--muted); margin-bottom: 10px; line-height: 1.45; }
.dd-link { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--card2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 7px; color: var(--text); font-size: 14px; font-weight: 600; text-decoration: none; }
.dd-link:hover { border-color: var(--blue); }
.dd-link .arrow { margin-left: auto; color: var(--blue); font-weight: 800; flex-shrink: 0; }
/* ---------- AI tutor ---------- */
.ai-fab { position: fixed; right: 16px; bottom: calc(78px + env(safe-area-inset-bottom)); z-index: 60; background: linear-gradient(135deg, var(--purple), var(--blue)); color: #fff; border: none; border-radius: 30px; padding: 13px 20px; font-family: inherit; font-size: 14px; font-weight: 800; cursor: pointer; box-shadow: 0 6px 20px rgba(0,0,0,0.45); display: flex; align-items: center; gap: 7px; }
.ai-fab:active { transform: scale(0.97); }
/* Docked split chat — lesson stays visible beside/above it (no popup). */
.ai-dock { position: fixed; z-index: 120; background: var(--bg); display: none; flex-direction: column; overflow: hidden; box-shadow: 0 -8px 30px rgba(0,0,0,0.4); }
body.ai-open .ai-dock { display: flex; }
/* Desktop: chat on the right, lesson shrinks to the left. */
@media (min-width: 760px) {
  .ai-dock { top: 0; right: 0; bottom: calc(56px + env(safe-area-inset-bottom)); width: var(--chat-w, 48%); border-left: 1px solid var(--border); box-shadow: -8px 0 30px rgba(0,0,0,0.4); }
  body.ai-open .app { max-width: none; margin: 0; width: calc(100vw - var(--chat-w, 48%)); }
}
/* Mobile: chat docked to the bottom, lesson on top. */
@media (max-width: 759px) {
  .ai-dock { left: 0; right: 0; height: var(--chat-h, 48vh); bottom: calc(56px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border); }
  body.ai-open { padding-bottom: calc(var(--chat-h, 48vh) + 66px); }
  body.ai-open .ai-fab { display: none !important; }
}
.ai-head { display: flex; align-items: center; gap: 10px; padding: 16px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.ai-head .ai-title { font-weight: 800; font-size: 15px; flex: 1; line-height: 1.3; }
.ai-head .ai-sub { font-size: 12px; color: var(--muted); font-weight: 600; }
.ai-x { background: var(--card2); border: 1px solid var(--border); color: var(--text); width: 34px; height: 34px; border-radius: 10px; font-size: 18px; cursor: pointer; flex-shrink: 0; font-family: inherit; }
.ai-msgs { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.ai-msg { max-width: 88%; padding: 12px 14px; border-radius: 14px; font-size: 14.5px; line-height: 1.55; }
.ai-msg.user { align-self: flex-end; background: var(--blue); color: #04283a; font-weight: 500; border-bottom-right-radius: 4px; }
.ai-msg.bot { align-self: flex-start; background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.ai-msg.bot pre { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; overflow-x: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; margin: 8px 0; color: #d8dce8; }
.ai-msg.bot code { font-family: var(--mono); font-size: 0.9em; background: var(--bg2); padding: 1px 5px; border-radius: 5px; color: #ffd479; }
.ai-msg.thinking { color: var(--muted); font-style: italic; }
.ai-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
.ai-chip { font-size: 13px; font-weight: 600; background: var(--card2); border: 1px solid var(--border); color: var(--text); border-radius: 20px; padding: 8px 13px; cursor: pointer; font-family: inherit; text-align: left; }
.ai-chip:hover { border-color: var(--purple); }
.ai-input-row { display: flex; gap: 8px; padding: 12px 14px; border-top: 1px solid var(--border); flex-shrink: 0; align-items: flex-end; }
.ai-input { flex: 1; background: var(--card2); border: 1px solid var(--border); border-radius: 12px; padding: 11px 13px; color: var(--text); font-family: inherit; font-size: 15px; resize: none; max-height: 120px; line-height: 1.4; }
.ai-input:focus { outline: none; border-color: var(--purple); }
.ai-send { background: var(--purple); color: #fff; border: none; border-radius: 12px; padding: 0 18px; height: 44px; font-weight: 800; font-family: inherit; font-size: 14px; cursor: pointer; flex-shrink: 0; }
.ai-send:disabled { opacity: 0.5; }
.ai-setup { padding: 20px; overflow-y: auto; }
.ai-setup h3 { margin: 14px 0 8px; }
.ai-setup .key-input { width: 100%; background: var(--card2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: var(--text); font-family: var(--mono); font-size: 13px; margin: 8px 0; }
.ai-err { color: var(--red); font-size: 13px; margin-top: 8px; }
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="tabbar">
  <button class="tab" data-view="today"><span class="icon">&#9889;</span>Today</button>
  <button class="tab" data-view="lessons"><span class="icon">&#128218;</span>Lessons</button>
  <button class="tab" data-view="practice"><span class="icon">&#127919;</span>Practice</button>
  <button class="tab" data-view="review"><span class="icon">&#128257;</span>Review</button>
  <button class="tab" data-view="profile"><span class="icon">&#127942;</span>Me</button>
</div>
<button id="aiFab" class="ai-fab" style="display:none">&#128172; Ask AI</button>
<div id="aiOverlay" class="ai-dock"></div>

<script>
"use strict";

/* ================= DATA ================= */
const LESSONS = [
{id:1,week:1,weekTheme:"How computers work",topic:"Memory",title:"How a C++ Program Actually Runs",
teaser:"Program vs process, what the compiler produces, and the fetch-decode-execute loop.",
body:"<p>Coming from Python, the biggest mental shift is this: Python runs your code line by line through an interpreter. C++ is <b>compiled</b> — your entire program is translated to machine instructions <i>before</i> it ever runs. The CPU never sees your C++; it only sees the machine code the compiler produced.</p><p>A few terms up front, so nothing is assumed: a <b>compiler</b> is a program (we'll use <code>g++</code>) that translates your C++ source into <b>machine code</b> — the raw numeric instructions a CPU understands. The <b>CPU</b> (processor) is the chip that actually executes those instructions. The <b>OS</b> (operating system — macOS, Linux, Windows) is the software that manages your machine and launches programs. A <b>terminal</b> is a text window where you type commands to run tools like the compiler.</p><h3>Your first program, and how to actually run it</h3><pre>// main.cpp\n#include &lt;iostream&gt;   // like Python's import — brings in printing\n\nint main() {            // every C++ program starts at main()\n    int x = 5;          // typed variable — the type is mandatory\n    int y = 10;\n    std::cout &lt;&lt; x + y &lt;&lt; \"\\n\";  // print — like print(x + y)\n    return 0;           // 0 = success, returned to the OS\n}</pre><p>The <code>std::</code> prefix means \"from the standard library\" (std = standard); <code>std::cout</code> is the standard output stream, and <code>&lt;&lt;</code> feeds values into it. Now compile and run it in a terminal:</p><pre>g++ -Wall main.cpp -o my_program   # compile: source → executable\n./my_program                        # run: OS creates a process</pre><p><code>g++</code> is the compiler, <code>main.cpp</code> is your source file, <code>-o my_program</code> names the output, and <code>-Wall</code> means \"warn me about all suspicious code\" — always use it; the warnings catch real bugs. The output file <code>my_program</code> is an <b>executable</b>: real machine instructions, sitting inert on disk like any other file until you run it.</p><h3>What happens when you run it</h3><p>The OS creates a <b>process</b> — a live instance of your program — and gives it its own private virtual address space, laid out roughly like this:</p><pre>+------------------+\n|      Stack       |  ← local variables, function calls (grows down)\n|        ↓         |\n|        ↑         |\n|       Heap       |  ← new/malloc allocations (grows up)\n+------------------+\n|     Globals      |  ← global/static variables\n+------------------+\n|   Code (.text)   |  ← your compiled instructions\n+------------------+</pre><p>One program can back many processes: run <code>./my_program</code> in two terminals and you have two processes, each with its own isolated memory. The CPU executes each one with a simple loop — <b>fetch</b> the next instruction, <b>decode</b> it, <b>execute</b> it — billions of times per second.</p><h3>See it yourself</h3><p>The compiler works in stages. <b>Assembly</b> is a human-readable version of machine instructions (things like <code>MOV</code> and <code>ADD</code>); an <b>object file</b> (<code>.o</code>) is the compiled machine code for one source file, not yet linked into a runnable program. You can ask <code>g++</code> to stop at each stage:</p><pre>g++ -S main.cpp -o main.s   # stop after generating assembly\ncat main.s                   # human-readable instructions the CPU runs</pre><p><b>Try it:</b> compile the program above with each of <code>-S</code> (assembly), <code>-c</code> (object file), and no flag (full executable). You've just watched the whole pipeline: source → assembly → machine code → running process.</p>",
keyPoints:["Program = passive file on disk. Process = running instance with its own address space.","The CPU never executes C++ — only compiled machine instructions.","Executables aren't fully loaded into RAM on launch — pages load on demand.","Address space regions: code, globals, heap (grows up), stack (grows down)."]},

{id:2,week:1,weekTheme:"How computers work",topic:"Pointers & Language",title:"Bits, Bytes & Why Pointers Exist",
teaser:"Memory as numbered mailboxes, and pointers as just addresses.",
body:"<p>Python hides memory from you completely. C++ shows you everything — so we build the whole picture from the ground up. Nothing here assumes you already know it.</p><h3>Bits and bytes</h3><p>A <b>bit</b> is a single 0 or 1 — the smallest piece of data. A <b>byte</b> is 8 bits grouped together. With 8 bits you can make 2⁸ = 256 different patterns, so one byte holds a number from 0 to 255. Bytes are the basic unit everything is measured in.</p><p>Different types use different numbers of bytes: a <code>char</code> is 1 byte, an <code>int</code> is (usually) 4 bytes, a <code>double</code> is 8 bytes. That's what <code>sizeof(int)</code> tells you — the number of bytes a type occupies.</p><h3>Memory is a giant numbered street</h3><p>Think of <b>RAM</b> (your computer's working memory) as one enormous street of mailboxes, each holding exactly one byte, each with a number. That number is the byte's <b>address</b>. If an <code>int</code> needs 4 bytes, it sits in 4 mailboxes in a row:</p><pre>address:  1000  1001  1002  1003  1004  1005 ...\nbyte:    [ ?? ][ ?? ][ ?? ][ ?? ][ ?? ][ ?? ]\n           └──────── one int (4 bytes) ────────┘ starts at address 1000</pre><h3>Why addresses are written in hex (0x...)</h3><p>You'll see addresses like <code>0x1000</code>. The <code>0x</code> prefix just means \"this number is written in <b>hexadecimal</b>\" (base-16) instead of the everyday base-10. Hex is used because each hex digit maps to exactly 4 bits, so one byte is always exactly two hex digits (<code>0xFF</code> = 255 = all 8 bits on). It's just a compact way to write the same number — <code>0x1000</code> is 4096 in decimal. Don't overthink it; it's a notation, not a new concept.</p><h3>What a pointer is</h3><p>A <b>pointer</b> is a variable whose value is an address. That's the entire idea. Two operators connect a normal variable to its address:</p><pre>int x = 5;      // an int, living at some address (say 0x1000)\n\nint* p = &x;    // &x means \"the ADDRESS OF x\" (the & operator)\n                // int* is a TYPE, read \"pointer to int\"\n                // so: p is a pointer-to-int, holding x's address (0x1000)</pre><p>The <code>&</code> in front of a variable means <b>\"address of\"</b> — it hands you the mailbox number where that variable lives. The <code>*</code> in a type (<code>int*</code>) means <b>\"pointer to\"</b>. So <code>int* p</code> declares p as a variable that stores the address of an int.</p><h3>Dereferencing: the * operator</h3><p>Once you hold an address, <code>*p</code> means <b>\"go to that address and give me the value living there.\"</b> This is called <b>dereferencing</b>. The same <code>*</code> symbol does two unrelated jobs depending on context — in a <i>type</i> it means \"pointer to,\" in an <i>expression</i> it means \"dereference.\"</p><pre>std::cout &lt;&lt; x;    // 5      — the value of x\nstd::cout &lt;&lt; p;    // 0x1000 — the address stored in p\nstd::cout &lt;&lt; *p;   // 5      — go to address 0x1000, read the value there\n\n*p = 99;        // go to address 0x1000 and WRITE 99 there\nstd::cout &lt;&lt; x;    // 99 — x changed! p pointed at x's mailbox all along</pre><p>That last part is the \"aha\": p literally points at x's memory, so writing through p changes x. Because a pointer only ever stores an address, and all addresses are the same size, every pointer on a 64-bit machine is 8 bytes — whether it points to a <code>char</code> or a giant struct.</p><h3>Pointer arithmetic, one step at a time</h3><p>An <b>array</b> is several values of one type packed side by side in memory:</p><pre>int arr[3] = {10, 20, 30};\n\naddress:  1000      1004      1008\nvalue:   [  10  ]  [  20  ]  [  30  ]\n          arr[0]    arr[1]    arr[2]</pre><p>Notice the addresses jump by 4, not 1 — because each <code>int</code> is 4 bytes wide. Now, the array's name by itself acts as a pointer to its first element (this is called <b>array decay</b>):</p><pre>int* p = arr;   // p holds the address of arr[0], i.e. 1000</pre><p>Here's the key rule. When you write <code>p + 1</code>, C++ does <b>not</b> add 1 to the raw address. It adds <b>one whole element</b> — it moves forward by <code>sizeof(int)</code> = 4 bytes:</p><pre>p        → address 1000  → points at arr[0]\np + 1    → address 1004  → points at arr[1]   (moved 4 bytes, not 1)\np + 2    → address 1008  → points at arr[2]\n\n*(p + 1) → dereference address 1004 → 20</pre><p>So <code>*(p + 1)</code> reads 20. And <code>p[1]</code> is just shorthand that means exactly <code>*(p + 1)</code> — that's why array indexing and pointers are secretly the same thing. The takeaway: <b>pointer arithmetic counts in elements, not bytes.</b> Add 1 to an <code>int*</code> and you move 4 bytes; add 1 to a <code>double*</code> and you move 8.</p><h3>What reinterpret_cast is</h3><p>A <b>cast</b> is you telling the compiler to treat a value as a different type than it currently is. C++ has several kinds; <code>reinterpret_cast&lt;NewType&gt;(value)</code> is the bluntest one: it means <b>\"take these exact same bytes in memory and pretend they're a different type — don't convert anything, just reinterpret them.\"</b></p><p>Why would you want that? To inspect an object's raw bytes. Normally an <code>int</code> shows you one number; but if you reinterpret its address as a pointer-to-<code>char</code>, you can walk its individual bytes one at a time (a <code>char</code> is 1 byte, so a <code>char*</code> lets you step byte by byte). We use exactly this trick next.</p><h3>Endianness — what it means and why it's asked</h3><p>Here's a subtle question: an <code>int</code> like 1 needs 4 bytes, but which byte goes in the <i>first</i> (lowest-address) mailbox? There are two conventions, and this ordering is called <b>endianness</b>:</p><pre>The number 1 as a 32-bit int is: 00000000 00000000 00000000 00000001\n                                  (three empty bytes, then a 1)\n\nLittle-endian (x86, your laptop): least-significant byte FIRST\n  address:  1000  1001  1002  1003\n  byte:    [ 01 ][ 00 ][ 00 ][ 00 ]   ← the '1' sits at the lowest address\n\nBig-endian (network order):        most-significant byte first\n  address:  1000  1001  1002  1003\n  byte:    [ 00 ][ 00 ][ 00 ][ 01 ]   ← the '1' sits at the highest address</pre><p>\"Least-significant byte\" just means the byte holding the smallest place-values (the ones/tens part of the number), the way the rightmost digit of 1,247 is the least significant. Little-endian puts that byte first.</p><p>You can detect which one your machine uses by storing 1 and peeking at the very first byte — using the <code>reinterpret_cast</code> trick from above:</p><pre>#include &lt;cstdint&gt;\n#include &lt;iostream&gt;\n\nbool isLittleEndian() {\n    uint32_t x = 1;              // a 4-byte int holding the value 1\n\n    // View x's address as a pointer to bytes so we can read byte 0:\n    unsigned char* bytePtr = reinterpret_cast&lt;unsigned char*&gt;(&x);\n\n    // If the FIRST byte is 1, the least-significant byte came first\n    // → little-endian. If it's 0, the machine is big-endian.\n    return bytePtr[0] == 1;\n}\n\nint main() {\n    std::cout &lt;&lt; (isLittleEndian() ? \"little\" : \"big\") &lt;&lt; \"\\n\";\n}</pre><p>Step by step: <code>&x</code> is x's address. <code>reinterpret_cast&lt;unsigned char*&gt;(&x)</code> says \"treat that address as pointing at bytes.\" <code>bytePtr[0]</code> (same as <code>*bytePtr</code>) reads the very first byte. On your laptop it'll be 1 → little-endian. This matters in practice because networks agreed to use big-endian (\"network byte order\"), so socket code calls <code>htons()</code>/<code>ntohl()</code> to convert — you'll see that again in the networking lessons.</p><p><b>Try it:</b> (1) print <code>&v</code> and <code>sizeof(v)</code> for a <code>char</code>, <code>int</code>, <code>double</code>, and a pointer — watch the sizes differ but pointer sizes match. (2) Run the endianness checker. (3) Make <code>uint32_t x = 0x12345678;</code>, then loop <code>i</code> from 0 to 3 printing <code>bytePtr[i]</code> in hex — you'll see <code>78 56 34 12</code>, the bytes reversed, which is little-endianness with your own eyes.</p>",
keyPoints:["A pointer is a variable holding a memory address — that's it.","`sizeof` any pointer on 64-bit = 8 bytes.","x86/x64 is little-endian; network byte order is big-endian (hence `htons`/`ntohl`).","Pointers exist for cheap passing of big data, sharing/mutating state, and dynamic structures."]},

{id:3,week:1,weekTheme:"How computers work",topic:"Memory",title:"Stack vs Heap",
teaser:"Why stack allocation is nearly free, and why returning &local is a bug.",
body:"<p>Every variable you declare lives somewhere in memory. C++ gives you two main places — the <b>stack</b> and the <b>heap</b> — and choosing between them is a daily decision Python never asked you to make. First the vocabulary: a <b>local variable</b> is one you declare inside a function (like <code>int x = 5;</code> in <code>main</code>); it exists only while that function is running. Both \"stack\" and \"heap\" are just regions of your process's memory from Lesson 1.</p><h3>The stack: automatic, fast, small</h3><p>The <b>stack</b> is a region of memory that works like a stack of plates — you only add to or remove from the top. Every function call pushes a <b>frame</b> (a block holding that call's local variables) onto the top; when the function returns, its frame is popped off. The CPU tracks where the top is with a special register called the <b>stack pointer</b> (a register is a tiny, ultra-fast storage slot inside the CPU itself). Watch the stack grow and shrink:</p><pre>void bar() { int b = 2; }        // frame: [b]\nvoid foo() { int a = 1; bar(); } // frame: [a], then bar's on top\nint main() { foo(); }\n\nStack during bar():        After bar() returns:\n+---------------+          +---------------+\n| bar():  b=2   | ← top    | (gone — freed  |\n+---------------+          |  by moving the |\n| foo():  a=1   |          |  stack pointer)|\n+---------------+          +---------------+\n| main()        |          | foo():  a=1   |\n+---------------+          +---------------+</pre><p>\"Freeing\" a frame is just moving the stack pointer back up — no cleanup work at all. That's why stack allocation is essentially free: one pointer bump. The cost: frames die when the function returns, and the whole stack is small (~1-8MB) — deep recursion or huge local arrays overflow it and crash.</p><h3>The heap: manual, flexible, slower</h3><p>The <b>heap</b> is a large region of memory you request chunks from on demand. The <b>allocator</b> is the piece of software (part of the standard library / OS) that hands out and reclaims heap memory. You ask for memory with <code>new</code> and return it with <code>delete</code>:</p><pre>int* p = new int(5);     // ask the heap allocator for 4 bytes, holding 5\n// ... use *p — it survives across function returns ...\ndelete p;                // YOU must give it back (until you learn RAII)</pre><p>The allocator has to search its bookkeeping for a free block big enough, mark it used, and later reabsorb it when you <code>delete</code> — real work, sometimes involving a lock so two threads don't grab the same block. That makes it slower than the stack's single pointer-bump, but the memory lives until you explicitly free it and can be any size.</p><h3>The bug this explains</h3><pre>int* bad() {\n    int x = 5;\n    return &x;    // ✗ x's frame is popped when bad() returns —\n}                 //   the pointer now points at dead memory (dangling)\n\nint* ok() {\n    return new int(5);   // ✓ heap memory survives the return\n}</pre><p>Compile <code>bad()</code> with <code>-Wall</code> and g++ warns you: <code>address of local variable 'x' returned</code>. Using that pointer is <b>undefined behavior</b> (UB) — meaning the C++ standard makes no promise about what happens: it might crash, might print garbage, or might even <i>appear</i> to work until the next function call reuses those bytes. \"Appears to work\" + \"is actually UB\" is a dangerous C++ combination — the bug hides until it bites in production, so learn to spot it early.</p><h3>Where do containers live?</h3><pre>void f() {\n    std::vector&lt;int&gt; v(1000);\n    // v itself (ptr + size + capacity, ~24 bytes) → STACK\n    // the 1000 ints v manages              → HEAP\n}   // v's destructor frees the heap buffer automatically — a preview of RAII</pre><p><b>Try it:</b> write a function with infinite recursion and run it — observe the stack overflow crash. Then write <code>bad()</code> above, compile with <code>-Wall</code>, and read the warning text carefully. Learn what the compiler's warnings look like now, while the programs are small.</p>",
keyPoints:["Stack: pointer-bump fast, scope-tied lifetime, small fixed size (~1-8MB), can overflow.","Heap: allocator bookkeeping, manual lifetime, large.","Never return a pointer/reference to a stack local.","Container objects live where declared; their buffers live on the heap."]},

{id:4,week:1,weekTheme:"How computers work",topic:"Pointers & Language",title:"References vs Pointers",
teaser:"Aliases vs addresses — and the trap question about null references.",
body:"<p>C++ has a second way to refer to an existing object: the <b>reference</b>. (In C++, \"object\" just means any variable or piece of data in memory — an <code>int</code>, a struct, a string; it does not mean \"object\" in the Python class sense.) Where a pointer is a box holding an address, a reference is an <b>alias</b> — a second name for the same object.</p><h3>Syntax side by side</h3><pre>int x = 5;\n\nint* p = &x;   // pointer: holds x's address\n*p = 10;       // must dereference with * to reach x\np = &other;    // can be re-aimed at something else\np = nullptr;   // nullptr = the \"points at nothing\" value for a pointer\n\nint& r = x;    // reference: r IS x from now on\nr = 20;        // no * needed — writes straight to x\n// r can NEVER be re-bound. r = y; doesn't rebind r,\n// it assigns y's VALUE into x. Big difference!</pre><p>Two must-know rules: a reference <b>must</b> be initialized when declared (<code>int& r;</code> won't compile — try it), and it can never be reseated afterward.</p><h3>Where you'll actually use them: function parameters</h3><pre>void byValue(int n)      { n += 1; }   // copies — caller unaffected\nvoid byPointer(int* n)   { if (n) *n += 1; }  // must null-check\nvoid byReference(int& n) { n += 1; }   // no copy, no null-check, clean syntax\n\nint a = 5;\nbyValue(a);      // a still 5\nbyPointer(&a);   // a now 6 — note the & at the call site\nbyReference(a);  // a now 7 — call site looks like byValue!</pre><p>The <code>&</code> at the call site of <code>byPointer(&a)</code> is the \"address of\" operator from Lesson 2 (a <b>call site</b> is just the place where you call the function). The workhorse pattern for passing big objects without copying is <code>const T&</code> — read \"reference to const T,\" meaning \"look, don't touch, don't copy\":</p><pre>void print(const std::string& s);   // no copy, can't modify\nprint(\"hello\");   // works — const& also accepts temporaries</pre><p>A <b>temporary</b> is an unnamed value that exists just for one expression — like the string built from <code>\"hello\"</code> above, or the result of <code>a + b</code>. A <code>const T&</code> can bind to a temporary (you're only reading it), but a plain <code>T&</code> can't, because a non-const reference implies you might modify something that's about to vanish. This distinction becomes important in Lesson 7 (move semantics).</p><h3>Choosing between them</h3><pre>Use a REFERENCE when:  the thing must always exist (most parameters)\nUse a POINTER  when:  \"nothing\" is a valid state (nullptr),\n                       you need to re-aim it,\n                       or you need arithmetic (arrays/buffers)</pre><h3>The interview trap</h3><p>\"Can a reference be null?\" The complete answer has two halves: not through valid C++ (must bind to a real object at birth) — but undefined behavior like <code>int& r = *static_cast&lt;int*&gt;(nullptr);</code> can technically produce one. Giving both halves is the senior signal. Related: you can't store raw references in a <code>vector</code> (they're not reassignable, which containers require) — that's what <code>std::reference_wrapper</code> is for.</p><p><b>Try it:</b> write <code>swap(int& a, int& b)</code>, then rewrite it with pointers. Compare the call sites. Then try to declare <code>int& r;</code> uninitialized and read the compiler error — you'll never forget the rule.</p>",
keyPoints:["Pointer: nullable, reassignable, arithmetic, explicit deref. Reference: none of those.","References must be initialized at declaration.","Use pointers when 'no value' is meaningful or reassignment/arithmetic is needed.","Can't store raw references in a vector — that's why `std::reference_wrapper` exists."]},

{id:5,week:2,weekTheme:"Memory management",topic:"Memory",title:"new/delete vs malloc/free",
teaser:"The single most-asked question — and its 'second level'.",
body:"<p>This is question #1 in your InterviewDB PDF, and it layers beautifully. Let's build up from code you can run.</p><h3>First: classes, constructors, destructors in 30 seconds</h3><p>A <b>class</b> is C++'s version of a Python class — a custom type bundling data and functions. A <b>constructor</b> is a special function that runs automatically when an object is created (named the same as the class); a <b>destructor</b> runs automatically when the object is destroyed (named <code>~ClassName</code>). <code>public:</code> means \"the things below are accessible from outside the class.\"</p><pre>class Widget {\npublic:\n    Widget()  { std::cout &lt;&lt; \"constructed\\n\"; }   // constructor: runs at creation\n    ~Widget() { std::cout &lt;&lt; \"destroyed\\n\"; }     // destructor: runs at destruction\n};</pre><h3>Now watch the difference</h3><pre>#include &lt;cstdlib&gt;   // malloc/free\n\n// malloc: raw bytes only. Constructor NEVER runs.\nWidget* a = (Widget*)malloc(sizeof(Widget));  // prints nothing!\nfree(a);                                       // prints nothing!\n\n// new: allocate AND construct. delete: destruct AND deallocate.\nWidget* b = new Widget();   // prints \"constructed\"\ndelete b;                    // prints \"destroyed\"</pre><p>Run this and the output <i>is</i> the interview answer: <code>malloc</code> hands you raw uninitialized bytes as a <code>void*</code> (a <b>void pointer</b> — an address with no type attached, so you must <i>cast</i> it to the real type before using it, using the cast idea from Lesson 2); <code>new</code> allocates, runs the constructor, and returns a properly-typed pointer. Failure differs too: <code>malloc</code> returns <code>NULL</code>; <code>new</code> <b>throws an exception</b> (<code>std::bad_alloc</code>) — \"throwing\" is C++'s error-signaling mechanism, an alternative to returning an error value that jumps control to an error handler.</p><h3>The rules that prevent undefined behavior</h3><pre>int* arr = new int[10];\ndelete[] arr;   // new[] pairs with delete[] — plain delete here is UB\n\nWidget* w = new Widget();\nfree(w);        // ✗ UB: destructor skipped + allocator mismatch\n// Never mix the malloc/free and new/delete families.</pre><h3>The second level: what interviewers hope you volunteer</h3><p><b>1. The <code>new</code> expression vs <code>operator new</code>.</b> The expression <code>new Widget()</code> actually does two separate things: calls <code>operator new(sizeof(Widget))</code> (just an allocation function, like malloc), then runs the constructor on those bytes. They're separable — which enables:</p><p><b>2. Placement new</b> — construct an object into memory you <i>already</i> own. The syntax <code>new (address) Type()</code> means \"build the object at this exact address instead of allocating.\" (<code>alignas(Widget)</code> just ensures the raw buffer starts at a memory address suitable for a Widget — see Lesson 24 on alignment; <code>-&gt;</code> is how you call a member function through a pointer, the same as Python's dot but for pointers.)</p><pre>alignas(Widget) char buffer[sizeof(Widget)];  // raw stack bytes, correctly aligned\nWidget* w = new (buffer) Widget();  // construct IN buffer — no allocation!\nw-&gt;~Widget();                        // must destroy manually — no delete</pre><p>This is the engine inside every custom allocator, memory pool, and <code>std::vector</code> itself.</p><p><b>3. Why vector doesn't use <code>new Widget[capacity]</code>:</b> <code>new[]</code> would construct <i>every</i> slot immediately. But a vector with capacity 100 and size 3 must have 97 slots of raw, unconstructed memory. So vector allocates raw bytes, then placement-news each element only when you actually add it. Allocation and construction, separated — the same two-step insight, now explaining a real STL design decision. Land that connection and you've aced this question.</p><p><b>Try it:</b> run the Widget demo above and confirm which lines print. Then do the placement-new version. Finally, explain out loud why <code>free()</code> on a <code>new</code>-ed object leaks — your Widget's prints already showed you.</p>",
keyPoints:["`new` = allocate + construct; `malloc` = allocate only.","`free` on a `new`-ed object skips the destructor; mixing families is UB.","Placement new: construct in existing memory; manually call the destructor after.","`vector` avoids `new[]` because it needs uninitialized capacity."]},

{id:6,week:2,weekTheme:"Memory management",topic:"RAII & Move",title:"Object Lifetime & RAII",
teaser:"Why C++ doesn't need a garbage collector.",
body:"<p>RAII is the single most important C++ idiom (an <b>idiom</b> is a standard pattern for doing something). It's how the language manages resources safely <i>without</i> a garbage collector. A <b>resource</b> is anything you acquire and must later release: heap memory (release with <code>delete</code>), an open file (must close), a lock, a network socket. A <b>garbage collector</b> (what Python and Java have) is a background process that automatically frees memory you're no longer using — C++ has none, so historically you had to free everything by hand. RAII automates it instead.</p><p>The name is terrible (\"Resource Acquisition Is Initialization\"); the idea is simple: <b>tie a resource to an object's lifetime</b>. The constructor grabs the resource, the destructor releases it, and C++ guarantees the destructor runs at <b>scope exit</b> — the moment execution leaves the <code>{ }</code> block the object was declared in — no matter how it leaves (normal end, <code>return</code>, or an exception).</p><h3>Build an RAII wrapper yourself</h3><pre>#include &lt;cstdio&gt;\n\nclass FileHandle {\npublic:\n    FileHandle(const char* path) {\n        file_ = fopen(path, \"r\");        // ACQUIRE in constructor\n        std::printf(\"opened\\n\");\n    }\n    ~FileHandle() {\n        if (file_) fclose(file_);         // RELEASE in destructor\n        std::printf(\"closed\\n\");\n    }\n    FILE* get() { return file_; }\nprivate:\n    FILE* file_;\n};\n\nvoid process() {\n    FileHandle f(\"data.txt\");   // prints \"opened\"\n    doWork();                     // might throw an exception...\n}   // prints \"closed\" HERE — even if doWork() threw. Guaranteed.</pre><p>Compare the manual version — this is the bug RAII eliminates:</p><pre>void processUnsafe() {\n    FILE* f = fopen(\"data.txt\", \"r\");\n    doWork();      // if this throws → fclose is never reached → LEAK\n    fclose(f);\n}</pre><p>Every early <code>return</code>, every <code>throw</code>, every code path — the destructor runs. That determinism is why the whole standard library is built on RAII: <code>vector</code> (owns a heap buffer), <code>fstream</code> (owns a file), <code>lock_guard</code> (owns a mutex lock), <code>unique_ptr</code> (owns any pointer):</p><pre>#include &lt;memory&gt;\nauto p = std::make_unique&lt;Widget&gt;();  // heap Widget, no delete needed —\n                                        // unique_ptr's destructor does it</pre><h3>Rules interviewers probe</h3><p><b>Destruction order:</b> <b>members</b> (the variables declared inside a class, like <code>file_</code> above — note <code>private:</code> means they're hidden from outside code) are constructed in <i>declaration order</i> (top to bottom in the class) and destroyed in reverse. If a constructor throws partway, already-built members are properly destroyed — but the object's own destructor never runs (it never fully existed).</p><p><b>The virtual destructor rule.</b> First, two terms: <b>inheritance</b> is when one class (<code>Derived</code>) extends another (<code>Base</code>) via <code>: public Base</code>; <b>polymorphism</b> is using a <code>Base*</code> pointer to point at a <code>Derived</code> object. A <b>virtual</b> function is one where C++ looks up the <i>actual</i> object's version at runtime rather than the pointer's declared type. Here's why the destructor must be virtual:</p><pre>class Base { public: ~Base() {} };            // ✗ not virtual\nclass Derived : public Base {\n public: ~Derived() { /* releases stuff */ }\n};\nBase* b = new Derived();\ndelete b;    // only ~Base() runs — Derived's cleanup SKIPPED. Leak/UB.\n\n// Fix: class Base { public: virtual ~Base() {} };</pre><p>Rule of thumb: any class with a virtual function needs a virtual destructor.</p><p><b>Try it:</b> build the FileHandle class, call it in a function that throws an exception halfway, and watch \"closed\" still print. Then reproduce the virtual-destructor bug with print statements in both destructors — seeing Derived's message vanish teaches it permanently.</p>",
keyPoints:["RAII = resource lifetime tied to object lifetime; destructors run even during exceptions.","It applies to any resource: memory, locks, files, sockets.","Members destroy in reverse declaration order.","Base classes used polymorphically need virtual destructors."]},

{id:7,week:2,weekTheme:"Memory management",topic:"RAII & Move",title:"Copy vs Move Semantics",
teaser:"Stealing instead of copying — and why emplace_back wins.",
body:"<p>Move semantics (C++11) is the most important modern-C++ topic in these interviews. Build it up from the problem it solves.</p><h3>The problem: copying is expensive</h3><pre>class Buffer {\npublic:\n    Buffer(size_t n) : data_(new int[n]), size_(n) {}\n    ~Buffer() { delete[] data_; }\n\n    // COPY constructor: duplicate the whole buffer — O(n)\n    Buffer(const Buffer& other)\n        : data_(new int[other.size_]), size_(other.size_) {\n        std::copy(other.data_, other.data_ + size_, data_);\n    }\nprivate:\n    int* data_;\n    size_t size_;\n};\n\nBuffer a(1000000);\nBuffer b = a;        // copy ctor: allocates + copies a million ints</pre><p>New syntax to decode here: the <code>: data_(new int[n]), size_(n)</code> after a constructor's <code>()</code> is a <b>member initializer list</b> — it sets the object's members before the constructor body runs (the preferred way to initialize them). <code>size_t</code> is just an unsigned integer type used for sizes and counts. <code>std::copy(from_begin, from_end, to)</code> is a standard-library function that copies a range of elements. So the copy constructor allocates a fresh buffer and copies every element into it.</p><p>But what if the source is a <b>temporary</b> that's about to die anyway (the unnamed-value idea from Lesson 4)? Copying its data just to destroy the original is pure waste. Enter:</p><h3>The move constructor: steal, don't copy</h3><pre>    // MOVE constructor: steal the pointer — O(1)\n    Buffer(Buffer&& other) noexcept\n        : data_(other.data_), size_(other.size_) {  // take their pointer\n        other.data_ = nullptr;    // null out the source so its\n        other.size_ = 0;          // destructor doesn't free OUR data\n    }</pre><p>Read the pieces: <code>Buffer&&</code> (with two ampersands) is an <b>rvalue reference</b> — a reference that only binds to temporaries. \"O(1)\" is Big-O notation meaning constant time — the work doesn't grow with buffer size, because we copy two small fields (a pointer and a size), not a million ints. <code>noexcept</code> promises this function won't throw an exception (important below). The source is left <i>valid but empty</i>: safe to destroy or reassign, but you shouldn't rely on its contents.</p><pre>Buffer c = std::move(a);  // move ctor runs: c steals a's buffer. a is empty.</pre><p><code>std::move</code> is the most misleadingly-named thing in C++: it moves nothing. It's a <i>cast</i> to <code>Buffer&&</code>, telling the compiler \"you may treat this as a temporary — stealing allowed.\" The move constructor does the actual work.</p><h3>lvalue vs rvalue, precisely</h3><pre>int x = 5;\n// x       → lvalue: named, persistent, addressable\n// 5       → rvalue: temporary, no identity\n// x + 3   → rvalue: the result is a temporary\nBuffer make() { return Buffer(10); }\n// make()  → rvalue: return-by-value produces a temporary</pre><h3>Why this answers the Jane Street classic</h3><pre>vec.push_back(Widget(a, b));  // 1) construct temporary  2) MOVE it in\nvec.emplace_back(a, b);       // construct ONCE, directly in the\n                               // vector's storage (placement new)</pre><p>One construction vs two — that's the whole answer to \"why is emplace_back faster?\"</p><h3>Two rules that bite in practice</h3><p><b>noexcept matters:</b> mark move constructors <code>noexcept</code> (as above). During reallocation, <code>vector</code> only uses moves it knows can't throw — otherwise it falls back to copying everything, silently.</p><p><b>Rule of Five / Rule of Zero:</b> if you hand-write any of {destructor, copy ctor, copy assign, move ctor, move assign}, you probably need all five (defining a destructor suppresses auto-generated moves!). Better: the <b>Rule of Zero</b> — build your class from RAII members (<code>vector</code>, <code>string</code>, <code>unique_ptr</code>) and write none of the five; the compiler generates them all correctly.</p><p><b>Try it:</b> add <code>std::cout</code> prints to Buffer's copy and move constructors, then run <code>Buffer b = a;</code>, <code>Buffer c = std::move(a);</code>, and <code>vec.push_back(Buffer(10))</code>. Predict which prints fire before each line. When your predictions hit 100%, you own this topic.</p>",
keyPoints:["Move = steal internals, O(1); source left valid but unspecified.","`std::move` is just a cast — the move ctor does the actual work.","`emplace_back` constructs in place; `push_back` makes a temporary first.","Move ctors need `noexcept` or vector reallocation falls back to copying."]},

{id:8,week:3,weekTheme:"STL internals",topic:"STL",title:"vector Internals",
teaser:"Amortized O(1), geometric growth, and iterator invalidation.",
body:"<p><code>std::vector</code> is the <b>container</b> you'll use 90% of the time. (A container is a standard-library type that holds a collection of elements — <code>vector</code> is C++'s resizable array, the rough equivalent of a Python list.) \"Implement vector\" is a real interview task at these firms, so understand it by building it.</p><h3>What a vector actually is</h3><p>The <code>template &lt;typename T&gt;</code> line means \"works for any element type T\" — full details in Lesson 12; for now just read <code>T</code> as \"whatever type the vector holds.\"</p><pre>template &lt;typename T&gt;\nclass SimpleVector {\n    T* data_;          // pointer to a heap buffer holding the elements\n    size_t size_;      // how many elements are in use right now\n    size_t capacity_;  // how many fit before we must reallocate\n};\n// That's it. Three fields, ~24 bytes. The elements live on the heap.</pre><h3>Watch growth happen</h3><pre>std::vector&lt;int&gt; v;\nfor (int i = 0; i &lt; 5; ++i) {\n    v.push_back(i);\n    std::cout &lt;&lt; \"size=\" &lt;&lt; v.size()\n              &lt;&lt; \" cap=\" &lt;&lt; v.capacity() &lt;&lt; \"\\n\";\n}\n// Typical output (libstdc++): cap goes 1, 2, 4, 4, 8 — doubling</pre><p>When a push exceeds capacity, the vector: (1) allocates a bigger block (~2x the size), (2) moves every element across, (3) destroys the old elements and frees the old block. That single push costs O(n) (work proportional to the number of elements) — but doubling makes those expensive reallocations exponentially rarer, so n pushes cost O(n) total. <b>Amortized</b> means \"averaged over many operations\": the per-push average works out to O(1) (constant) even though occasional individual pushes are O(n). If the vector grew by just +1 each time instead, every push would recopy everything — O(n²) total, disastrously slow. Geometric (doubling) growth is the whole trick.</p><h3>Implement the core yourself (memorize this shape)</h3><pre>void push_back(const T& value) {\n    if (size_ == capacity_) grow();\n    data_[size_++] = value;\n}\n\nvoid grow() {\n    size_t newCap = capacity_ == 0 ? 1 : capacity_ * 2;\n    T* newData = new T[newCap];              // simplified — real vector\n    for (size_t i = 0; i &lt; size_; ++i)       // uses raw alloc + placement\n        newData[i] = std::move(data_[i]);    // new (see Lesson 5!)\n    delete[] data_;\n    data_ = newData;\n    capacity_ = newCap;\n}</pre><h3>The gotchas interviews test</h3><pre>std::vector&lt;int&gt; v = {1, 2, 3};\nint* p = &v[0];\nv.push_back(4);        // may reallocate → p now DANGLES\n// Reallocation invalidates ALL iterators/pointers/references.\n// (An ITERATOR is an object that points into a container, like a\n//  smart pointer to an element — v.begin() gives you one. If the\n//  buffer moves, every iterator/pointer into it is left dangling.)\n\nv.clear();             // size → 0, but capacity UNCHANGED\nv.shrink_to_fit();     // non-binding request to release capacity\n\nstd::vector&lt;int&gt; w;\nw.reserve(1000);       // pre-allocate: no reallocation for 1000 pushes\n                        // — the #1 cheap optimization in real code</pre><p><b>Try it:</b> run the growth-printing loop on your machine and find your compiler's growth factor. Then finish SimpleVector: add <code>operator[]</code>, <code>size()</code>, a destructor, and a copy constructor (Lesson 7 shows the move constructor). You will genuinely be asked to write something like this.</p>",
keyPoints:["`push_back` is amortized O(1) — individual pushes can be O(n).","Growth is geometric (~1.5-2x, implementation-defined).","Reallocation invalidates everything; erase invalidates from that point on.","`clear()` doesn't release capacity; `reserve()` prevents reallocation."]},

{id:9,week:3,weekTheme:"STL internals",topic:"STL",title:"string & Small String Optimization",
teaser:"Why short strings never touch the heap.",
body:"<p><code>std::string</code> is conceptually a <code>vector&lt;char&gt;</code> — but with one clever twist that's a favorite senior-signal interview question.</p><h3>The observation that motivates it</h3><p>Most real strings are short: ticker symbols (\"AAPL\"), field names, small identifiers. Heap-allocating 5 bytes via the general allocator — with all its bookkeeping — for every tiny string would be absurd overhead. So implementations store short strings <b>inline, inside the string object's own bytes</b>. No heap allocation at all.</p><h3>See it on your machine</h3><pre>std::string s = \"hi\";\nstd::cout &lt;&lt; sizeof(s) &lt;&lt; \"\\n\";      // typically 32 — regardless of content\nstd::cout &lt;&lt; s.capacity() &lt;&lt; \"\\n\";   // often 15 or 22 for an EMPTY string —\n                                          // that's the inline (SSO) buffer size!\n\nstd::string big(100, 'x');\n// 100 chars &gt; SSO buffer → this one IS heap-allocated</pre><h3>How it's implemented (interview sketch)</h3><p>Two terms first. A <b>union</b> is a special type where all members share the <i>same</i> memory — only one is valid at a time. That's perfect here: a string is either short (use the inline char array) or long (use the heap pointer), never both, so overlapping them saves space. <code>static constexpr</code> means a compile-time constant; <code>strlen</code> counts a C-string's characters; <code>memcpy</code> copies raw bytes.</p><pre>class SimpleString {\n    static constexpr size_t SSO_CAP = 15;\n    union {                        // same bytes, two interpretations:\n        char inline_[SSO_CAP + 1]; //  short: chars stored right here\n        char* heap_;               //  long:  pointer to heap buffer\n    };\n    size_t size_;\n    bool onHeap_;\npublic:\n    SimpleString(const char* s) {\n        size_ = strlen(s);\n        if (size_ &lt;= SSO_CAP) {\n            memcpy(inline_, s, size_ + 1);   // no allocation!\n            onHeap_ = false;\n        } else {\n            heap_ = new char[size_ + 1];\n            memcpy(heap_, s, size_ + 1);\n            onHeap_ = true;\n        }\n    }\n    ~SimpleString() { if (onHeap_) delete[] heap_; }\n};</pre><p>A <code>union</code> lets the same bytes serve as either the inline buffer or the heap pointer — that's how the object stays at 32 bytes for both cases.</p><h3>The subtlety interviewers love</h3><p>Moving a <i>heap-backed</i> string is a true O(1) pointer steal (Lesson 7). But an SSO string's data lives <i>inside the object</i> — there's no pointer to steal. Its \"move\" must copy the inline bytes. Still cheap (≤22 bytes, stack-local), but not the O(1) pointer swap — knowing this distinction is exactly the second-level answer that scores.</p><p><b>Try it:</b> print <code>capacity()</code> of strings of length 1, 15, 16, 22, 23 on your machine and find your standard library's exact SSO threshold. Then add copy and move constructors to SimpleString, handling both the inline and heap cases — the move case forces you to internalize why SSO moves differ.</p>",
keyPoints:["SSO stores short strings inline in the object — zero heap traffic.","Threshold ~15 (libstdc++) to ~22 (libc++) chars; object is usually 32 bytes.","SSO strings don't get O(1) moves — inline bytes must be copied.","Concrete example of allocation-avoiding, cache-friendly STL design."]},

{id:10,week:3,weekTheme:"STL internals",topic:"STL",title:"Hash Maps: Collisions & Load Factor",
teaser:"Buckets, chaining vs probing, and when O(1) lies to you.",
body:"<p>\"How is a hashmap implemented? How do you handle collisions?\" — direct from your InterviewDB PDF. Python's <code>dict</code> spoiled you; now you get to build one.</p><h3>The core mechanism</h3><pre>buckets (array, size 8):\nindex:   0    1    2    3        4    5    6    7\n        [ ]  [ ]  [ ]  [cat:1]  [ ]  [ ]  [ ]  [ ]\n\ninsert(\"cat\", 1):  hash(\"cat\") % 8 = 3  → bucket 3\nlookup(\"cat\"):     hash(\"cat\") % 8 = 3  → jump straight there. O(1).</pre><p>A <b>hash function</b> turns a key into a number; mod the bucket count gives an index. No scanning — that's the whole O(1) story. Until:</p><h3>Collisions</h3><pre>insert(\"dog\", 2):  hash(\"dog\") % 8 = 3  → bucket 3 is TAKEN</pre><p>Two strategies — know both:</p><p><b>Chaining</b> (what <code>std::unordered_map</code> uses): each bucket holds a little list; colliding entries append to it. Lookup in a crowded bucket degrades to scanning its chain.</p><pre>bucket 3: [cat:1] → [dog:2] → null</pre><p><b>Open addressing</b>: no lists — on collision, probe forward for the next free slot (<code>dog</code> goes to bucket 4). Better cache locality (no pointer-chasing), but clusters form and deletion needs tombstones.</p><h3>Build one — this is an actual interview task</h3><pre>#include &lt;vector&gt;\n#include &lt;utility&gt;\n#include &lt;functional&gt;\n\nclass HashMap {   // chaining, simplified\n    std::vector&lt;std::vector&lt;std::pair&lt;std::string,int&gt;&gt;&gt; buckets_;\npublic:\n    HashMap() : buckets_(8) {}\n\n    void insert(const std::string& key, int value) {\n        auto& bucket = buckets_[std::hash&lt;std::string&gt;{}(key) % buckets_.size()];\n        for (auto& kv : bucket)\n            if (kv.first == key) { kv.second = value; return; }  // update\n        bucket.push_back({key, value});                           // insert\n    }\n\n    int* find(const std::string& key) {\n        auto& bucket = buckets_[std::hash&lt;std::string&gt;{}(key) % buckets_.size()];\n        for (auto& kv : bucket)\n            if (kv.first == key) return &kv.second;\n        return nullptr;\n    }\n};</pre><h3>Load factor and rehashing</h3><p><b>Load factor</b> = size / bucket_count. As it climbs, chains lengthen and O(1) rots. Past a threshold (default 1.0 for <code>unordered_map</code>), the map <b>rehashes</b>: ~doubles the bucket array and redistributes every element — O(n) once, amortized O(1) overall (the same geometric argument as vector's growth, Lesson 8). <code>m.reserve(n)</code> pre-sizes buckets to skip rehashes, exactly like vector's reserve.</p><p><b>Worst case</b>: if everything collides (bad or adversarial hash), lookup is O(n) — one long chain. \"O(1)\" is always <i>average-case, given a good hash and sane load factor</i>. Say it that way.</p><p><b>Try it:</b> build the HashMap above and test it. Then sabotage it — replace the hash with <code>return 0;</code> — and print how long lookups take with 10,000 entries vs the real hash. You've just demonstrated the O(n) worst case from your own code.</p>",
keyPoints:["Collision handling: chaining (std uses this) vs open addressing.","Average O(1); worst case O(n) with pathological hashing.","Rehash triggers past max load factor; invalidates iterators.","Good hash = deterministic, fast, uniformly distributed."]},

{id:11,week:4,weekTheme:"STL + language",topic:"STL",title:"map vs unordered_map, and deque",
teaser:"Tree vs hash table, and the segmented-array trick.",
body:"<p>Two containers, two clever structures — and two questions straight from your PDF.</p><h3>Part A: map vs unordered_map</h3><pre>#include &lt;map&gt;\n#include &lt;unordered_map&gt;\n\nstd::map&lt;std::string,int&gt; m;            // red-black TREE\nstd::unordered_map&lt;std::string,int&gt; um; // HASH TABLE (Lesson 10)\n\nm[\"b\"]=2; m[\"a\"]=1; m[\"c\"]=3;\nfor (auto& [k,v] : m)  std::cout &lt;&lt; k;   // \"abc\" — always sorted!\nfor (auto& [k,v] : um) std::cout &lt;&lt; k;   // any order — no guarantee</pre><table-like><pre>                 map (RB-tree)      unordered_map (hash)\nlookup/insert    O(log n) GUARANTEED  O(1) avg, O(n) worst\niteration order  sorted by key        unspecified\nmemory           node ptrs per entry  bucket array + chains</pre><p>When to pick <code>map</code>: you need sorted iteration, or <b>predictable worst-case latency</b> — a hash table's occasional rehash or collision pile-up is a latency spike, and in HFT tail latency often matters more than average speed. That framing is the interview gold.</p><p><b>kth smallest key?</b> From a <code>map</code>: iterate k steps — the tree is already sorted, O(k). From an <code>unordered_map</code>: it was <i>never</i> sorted — extract all keys, sort, index: O(n log n). Structure determines cost.</p><h3>Part B: implement deque — the segmented-array trick</h3><p>Requirement (verbatim from your PDF): O(1) push/pop at <i>both</i> ends, plus random access. A single array can't (front-push shifts everything). A linked list can't (no O(1) indexing). The answer is neither:</p><pre>map (small array of chunk pointers):\n[ chunk0* ][ chunk1* ][ chunk2* ]\n     ↓          ↓          ↓\n  [_,_,a,b]  [c,d,e,f]  [g,h,_,_]     ← fixed-size chunks (say 4)\n   front→                  ←back</pre><p><b>push_back</b>: write into the back chunk's next free slot; if full, allocate a fresh chunk and append its pointer to the map. Nothing ever shifts → O(1). <b>push_front</b>: symmetric at the front. <b>Random access</b> is two array lookups:</p><pre>T& operator[](size_t i) {\n    size_t j = i + frontOffset_;          // account for front slack\n    return *(chunks_[j / CHUNK_SIZE]       // which chunk\n              + (j % CHUNK_SIZE));         // where in it\n}</pre><p>Division + modulo — no traversal, O(1). The tradeoff vs vector: elements aren't one contiguous block, so sequential scans hop between chunks — worse cache behavior (Lesson 22). Use deque only when you truly need both ends.</p><p><b>Try it:</b> implement a minimal int-deque: <code>std::vector&lt;int*&gt;</code> of 4-element chunks supporting <code>push_back</code> and <code>operator[]</code>. Then explain aloud why a linked list can never satisfy the random-access requirement — that contrast is the expected answer's core.</p>",
keyPoints:["map: RB-tree, O(log n) guaranteed, sorted. unordered_map: hash, O(1) avg.","Predictable worst-case latency can favor map in HFT contexts.","deque = fixed chunks + pointer map; O(1) both ends AND random access.","deque is NOT a linked list — linked lists can't do O(1) random access."]},

{id:12,week:4,weekTheme:"STL + language",topic:"Pointers & Language",title:"Templates, inline & const",
teaser:"Compile-time code generation and two classic trap questions.",
body:"<p>Templates are how C++ writes code that works for any type <i>without</i> runtime cost. After this lesson you will write your own — not just recognize them.</p><h3>Function templates, from zero</h3><p>You want <code>max</code> for ints, doubles, strings. Without templates you'd copy-paste three functions. Instead:</p><pre>template &lt;typename T&gt;      // \"for any type, call it T...\"\nT myMax(T a, T b) {         // a function taking two T's, returning T\n    return a &gt; b ? a : b;\n}\n\nmyMax(3, 5);        // compiler GENERATES int myMax(int, int)\nmyMax(2.5, 1.0);    // compiler GENERATES double myMax(double, double)\nmyMax&lt;double&gt;(3, 5.0);  // explicit T when deduction is ambiguous</pre><p>Key mental model: a template is a <b>blueprint</b>, not a function. Each distinct T stamps out a real, fully-typed function at <i>compile time</i> — this is why templates have zero runtime overhead, and it's the \"zero-cost abstraction\" story interviewers want (Lesson 23).</p><h3>Class templates — you've been using them all along</h3><p><code>std::vector&lt;int&gt;</code> is a class template instantiation. Write your own:</p><pre>template &lt;typename T&gt;\nclass Box {\npublic:\n    Box(T value) : value_(value) {}\n    T get() const { return value_; }     // const = doesn't modify the Box\nprivate:\n    T value_;\n};\n\nBox&lt;int&gt; b1(42);\nBox&lt;std::string&gt; b2(\"hello\");   // two completely separate generated classes</pre><p>Multiple parameters work as you'd guess: <code>template &lt;typename K, typename V&gt; class Pair { K key; V value; };</code></p><h3>The rule that surprises everyone</h3><p>Template definitions must live in <b>header files</b>. Why: the compiler can only stamp out <code>myMax&lt;YourType&gt;</code> if it can <i>see the full definition</i> at the call site. A definition hidden in a separate .cpp isn't visible → linker error (<code>undefined reference</code>). When you hit that error with templates, this is why.</p><p>Costs worth naming in interviews: per-type code generation bloats binaries and slows compiles; error messages are notoriously long (C++20 concepts improve this by constraining T up front).</p><h3>inline — the trap question</h3><p>Historically \"paste the body at the call site\" (kills call overhead). The trap: in modern C++, <code>inline</code>'s <i>guaranteed</i> effect is linkage — allowing identical definitions across translation units. Actual inlining is the compiler's own decision, keyword or not. Why does inlining help at all? A call is a jump: pipeline disruption, branch prediction, saved registers. Inlined code is straight-line and optimizable across the boundary. Over-inlining backfires via instruction-cache bloat — say that too.</p><h3>const pointer decoder (read right-to-left)</h3><pre>const char* p;        // pointer to const char  — *p immutable, p movable\nchar* const p;        // const pointer to char  — p fixed, *p mutable\nconst char* const p;  // both locked</pre><p><b>Try it:</b> write templated <code>myMax</code>, call it with ints, doubles, and strings. Then write <code>template&lt;typename T&gt; T sum(const std::vector&lt;T&gt;& v)</code> that loops and adds. Compile with <code>g++ -S</code> after calling it with two types, and find both generated functions in the assembly — proof the blueprint stamped twice.</p>",
keyPoints:["Templates generate per-type code at compile time → must live in headers.","`inline`'s guaranteed modern effect is linkage, not forced inlining.","Calls cost pipeline/branch-prediction disruption vs straight-line inlined code.","Read pointer const right-to-left from the identifier."]},

{id:13,week:5,weekTheme:"Operating systems",topic:"OS & Virtual Memory",title:"Virtual Memory, Paging & the TLB",
teaser:"The hotel-front-desk trick that makes process isolation possible.",
body:"<p>This cluster — virtual memory, page tables, TLB — is HRT's favorite territory, and it's where Python-only backgrounds feel shakiest. Take it slowly; it's one idea applied three times.</p><h3>The one idea: addresses are lies (useful ones)</h3><p>When your program uses address <code>0x1000</code>, that is a <b>virtual</b> address — a fiction private to your process. Hardware (the MMU) translates it to a real physical RAM address on every access, using a per-process lookup structure called the <b>page table</b>.</p><pre>Process A                    Process B\nvirtual 0x1000 ──→ physical frame 5\n                    virtual 0x1000 ──→ physical frame 9\n\nSame virtual address, different physical memory.\nNeither process can even NAME the other's memory. That's isolation.</pre><h3>Page tables, concretely</h3><p>Memory is managed in <b>pages</b> (typically 4KB). A virtual address splits into [page number | offset]; the page table maps page number → physical frame number; the offset carries over:</p><pre>virtual:  [ page# 0x42 | offset 0x1A3 ]\n                 │\n           page table: 0x42 → frame 0x7\n                 │\nphysical: [ frame 0x7 | offset 0x1A3 ]</pre><p>(Real page tables are multi-level trees to stay compact, but this is the model to hold.)</p><h3>The 8GB-on-4GB question</h3><p>Allocating 8GB of <i>virtual</i> space on a 4GB-RAM machine usually succeeds — virtual space is a promise of addressability, not physical backing. Pages get physical frames only on first touch (<b>demand paging</b>). If RAM fills, the OS evicts cold pages to disk (<b>swap</b>) and reloads them if touched again — that's the \"everything got slow\" swap experience.</p><h3>Page fault vs segfault — don't conflate</h3><pre>Access unmapped-but-valid page → PAGE FAULT → OS loads it, resumes.\n                                  Normal! Happens constantly.\nAccess invalid address (null,   → PAGE FAULT the OS can't satisfy\n write to read-only memory)       → SIGSEGV → crash. THAT's a segfault.</pre><p>A segfault is just a page fault with no legitimate resolution. Now you can also answer \"what happens during a segfault, and how would you implement it\" — the MMU raises a fault, the OS checks its mappings, finds the access invalid, delivers SIGSEGV.</p><h3>The TLB</h3><p>Page-table walks cost extra memory accesses — doing one per load/store would be brutal. The <b>TLB</b> is a tiny, very fast hardware cache of recent translations. Hit: translation is free. Miss: walk the tree. \"How do you increase TLB hit rate?\" — two levers:</p><pre>1. LOCALITY: touch nearby addresses (vector scans reuse the same\n   page's cached translation; scattered pointer-chasing doesn't).\n2. HUGE PAGES: 2MB pages instead of 4KB — each TLB entry covers\n   512x the memory. Real HFT systems configure this deliberately.</pre><p><b>Try it:</b> write a program that dereferences <code>nullptr</code> and run it — read the \"Segmentation fault\" message knowing exactly which chain of events produced it. Then explain aloud, from memory, why two processes can both use 0x1000. If you can teach it, you own it.</p>",
keyPoints:["Page tables map virtual pages → physical frames, per process.","Page fault = often normal (demand paging); segfault = invalid access escalated.","8GB request on 4GB RAM works via demand paging + swap.","TLB hit rate: improve locality, use huge pages."]},

{id:14,week:5,weekTheme:"Operating systems",topic:"OS & Virtual Memory",title:"Processes, Threads & Context Switching",
teaser:"The office-and-employees model, plus IPC and why switches cost.",
body:"<p>\"Process vs thread\" opens half of these interviews. Get the picture right and every follow-up (IPC, context switches, why threads race) falls out of it.</p><h3>The picture</h3><pre>PROCESS (own private virtual address space)\n+--------------------------------------------+\n|  Code    |  Globals  |  HEAP (shared by     |\n|          |           |  ALL threads)        |\n|                                              |\n|  Thread 1:  own stack, own registers         |\n|  Thread 2:  own stack, own registers         |\n+--------------------------------------------+</pre><p>A <b>process</b> is the isolated container. <b>Threads</b> are execution streams inside it: they share the heap, globals, and code — each has only a private stack and register state. Two consequences you must be able to derive: (1) threads communicate by just reading/writing shared memory — fast, and dangerous (races, Lesson 17); (2) processes <i>can't</i> touch each other's memory, so they need explicit <b>IPC</b>.</p><h3>Write a thread right now</h3><pre>#include &lt;thread&gt;\n#include &lt;iostream&gt;\n\nvoid work(int id) { std::cout &lt;&lt; \"thread \" &lt;&lt; id &lt;&lt; \"\\n\"; }\n\nint main() {\n    std::thread t1(work, 1);   // starts running immediately\n    std::thread t2(work, 2);\n    t1.join();   // wait for it to finish — forgetting join = crash\n    t2.join();\n}\n// compile with:  g++ -Wall threads.cpp -pthread</pre><h3>IPC — know the list plus one line each</h3><pre>pipes          one-way byte stream (shell's |), related processes\nshared memory  same physical pages mapped into both — fastest, DIY sync\nsockets        general, works across machines (Lessons 15-16)\nsignals        async pokes (SIGKILL, SIGSEGV) — no data payload\nmessage queues OS-managed discrete messages</pre><h3>\"How does a computer do many things at once?\"</h3><p>Two mechanisms, often conflated — separating them cleanly is the strong answer:</p><p><b>Concurrency</b>: the scheduler time-slices one core, swapping threads every few ms via <b>context switches</b> — save this thread's registers/program counter/stack pointer, load another's. Fast switching creates the illusion of simultaneity on even one core.</p><p><b>Parallelism</b>: multiple cores literally executing at the same instant. Requires actual hardware.</p><h3>Why process switches cost more than thread switches</h3><p>Both save/restore registers. But switching <i>processes</i> means switching address spaces: new page table, TLB flush (Lesson 13!), cold caches. Threads share their process's page table — nothing to flush. That connection — \"threads share the page table, so their switches skip the TLB pain\" — links two lessons in one sentence and lands very well in interviews.</p><p><b>Try it:</b> run the thread example. Then make both threads increment a shared global <code>int counter</code> 1,000,000 times each with no protection, print the result — it won't be 2,000,000. You've just produced a real race condition; Lesson 17 explains exactly what happened.</p>",
keyPoints:["Threads share heap/globals/code; own stack + registers.","IPC: pipes, shared memory, sockets, signals, message queues.","Concurrency = interleaving (1 core ok); parallelism = simultaneous (needs cores).","Process switch > thread switch cost: page table + TLB + caches."]},

{id:15,week:6,weekTheme:"Networking",topic:"Networking",title:"TCP vs UDP",
teaser:"Reliability machinery vs raw speed — and why trading uses both.",
body:"<p>You flagged TCP vs UDP as a weak spot — so let's build it from what the network actually gives you, which is almost nothing.</p><h3>The starting point: networks lose things</h3><p>IP, the underlying layer, makes exactly one promise: \"I'll try to get this packet there.\" Packets can be dropped, duplicated, or arrive out of order. TCP and UDP are two answers to that reality.</p><h3>UDP: accept the chaos</h3><p>UDP adds almost nothing to IP: just port numbers (which app gets it) and a checksum. Send a datagram, hope. No connection, no confirmation, no ordering, no retry. What you get in exchange: <b>minimal latency and overhead</b>. Loss handling becomes your application's job.</p><h3>TCP: engineer reliability on top</h3><p>Four mechanisms — know each by name and purpose:</p><p><b>1. Connection setup</b> — the three-way handshake before any data:</p><pre>Client            Server\n  ── SYN ──────────→        \"want to talk, my seq# is X\"\n  ←─ SYN-ACK ───────        \"ok, mine is Y, I heard X\"\n  ── ACK ──────────→        \"heard Y\" — connected.</pre><p><b>2. Reliability + ordering</b> — every byte is numbered:</p><pre>  ── data seq=1 ────→\n  ←─ ACK 1 ──────────\n  ── data seq=2 ────→   ✗ lost in the network\n     (timeout, no ACK)\n  ── data seq=2 ────→   retransmit until ACKed\n  ←─ ACK 2 ──────────\nOut-of-order arrivals are buffered and re-sequenced\nbefore your app sees them.</pre><p><b>3. Flow control</b> — protects the <i>receiver</i>: each ACK advertises how much buffer space the receiver has left (the window); the sender never exceeds it. A fast sender can't drown a slow receiver.</p><p><b>4. Congestion control</b> — protects the <i>network</i>: the sender watches for loss and rising round-trip times (congestion symptoms) and throttles itself (slow start, congestion avoidance). Flow control = receiver-driven; congestion control = sender-inferred. Interviewers ask these as separate questions specifically to catch people conflating them.</p><h3>Why trading firms care — use both, deliberately</h3><p><b>Market data → UDP multicast.</b> Multicast = one packet, replicated by the network to every subscriber — impossible with TCP's per-connection point-to-point model at exchange scale (thousands of subscribers). And TCP's retransmission would <i>block newer data behind a retransmit of stale data</i> (head-of-line blocking); for a price feed, skipping a lost tick and reading the next one is better. Apps detect gaps via sequence numbers and request snapshots.</p><p><b>Order entry → TCP</b> (or a reliable protocol built on UDP). You cannot silently lose an order. Reliability is worth the latency here.</p><p><b>Try it:</b> from memory, draw the handshake and the lost-packet retransmission diagrams. Then answer aloud: \"why would an engineer deliberately choose the unreliable protocol?\" If your answer includes fan-out and head-of-line blocking, you're at interview depth.</p>",
keyPoints:["TCP reliability = sequence numbers + ACKs + retransmission + reordering.","Flow control protects the receiver; congestion control protects the network.","Multicast = one-to-many on UDP; TCP's point-to-point model can't fan out.","Market data → UDP multicast; order entry → reliable protocols."]},

{id:16,week:6,weekTheme:"Networking",topic:"Networking",title:"Sockets & traceroute",
teaser:"The TTL trick — routers telling on themselves.",
