body:"<p>How does your C++ actually touch the network? Through <b>sockets</b> — and understanding them also unlocks the delightfully sneaky <code>traceroute</code> question from your notes.</p><h3>Sockets: network I/O as file descriptors</h3><p>On Linux, a socket IS a file descriptor — the same kind of handle as an open file. You ask the kernel for one, then read/write through it; the kernel's network stack does the rest (TCP/UDP → IP → Ethernet → wire).</p><pre>#include &lt;sys/socket.h&gt;\n#include &lt;netinet/in.h&gt;\n#include &lt;arpa/inet.h&gt;\n\nint sock = socket(AF_INET, SOCK_DGRAM, 0);\n//                 IPv4     UDP  (SOCK_STREAM would be TCP)\n\nsockaddr_in addr{};\naddr.sin_family = AF_INET;\naddr.sin_port   = htons(9000);            // ← note htons!\ninet_pton(AF_INET, \"127.0.0.1\", &addr.sin_addr);\n\nsendto(sock, \"hi\", 2, 0, (sockaddr*)&addr, sizeof(addr));</pre><p><b>Why <code>htons</code>?</b> Network protocols define multi-byte fields as big-endian (\"network byte order\"); your x86 CPU is little-endian (Lesson 2!). <code>htons</code>/<code>ntohl</code> convert host↔network order. Connecting this to the endianness lesson in an interview shows you're building a model, not memorizing facts.</p><p>You won't be asked to write full socket servers live — but recognizing <code>SOCK_STREAM</code> vs <code>SOCK_DGRAM</code> and the byte-order calls signals real familiarity.</p><h3>traceroute: the TTL trick</h3><p>\"How is traceroute implemented?\" is a great question because the answer is a clever abuse of a safety feature.</p><p>The setup: every IP packet has a <b>TTL</b> (time-to-live) field. Each router that forwards the packet decrements it; at 0, the router <i>drops the packet and sends back an ICMP \"Time Exceeded\" message — signed, effectively, with its own address</i>. (TTL exists to keep lost packets from looping forever.)</p><p>The exploit: send packets with deliberately tiny TTLs.</p><pre>send TTL=1 → dies at router 1 → router 1 replies  → hop 1 identified\nsend TTL=2 → passes router 1, dies at router 2    → hop 2 identified\nsend TTL=3 → dies at router 3                      → hop 3 identified\n...\nsend TTL=n → actually REACHES the destination      → done, path mapped</pre><p>Each hop in traceroute's output is one router incriminating itself via TTL expiry. Bonus intuition: hop 1 always shows the lowest latency — it's your own gateway, one decrement away.</p><p><b>Try it:</b> run <code>traceroute 8.8.8.8</code> (macOS/Linux) and read each line knowing exactly what produced it. Then explain the mechanism aloud in under 60 seconds — it's a question where a crisp answer visibly separates candidates.</p>",
keyPoints:["Sockets are file descriptors backed by the network stack.","`htons`/`ntohl` = host ↔ network byte order (endianness in practice).","traceroute = incrementing TTL + ICMP Time Exceeded replies.","First hop replies fastest — it's one TTL decrement away."]},

{id:17,week:7,weekTheme:"Concurrency",topic:"Concurrency",title:"Race Conditions & Mutexes",
teaser:"Why counter++ is three instructions and how locks fix it.",
body:"<p>In Lesson 14's exercise, your two-thread counter came out wrong. Here's exactly why, and every tool for fixing it.</p><h3>The autopsy: counter++ is three instructions</h3><pre>counter++;   // looks atomic. Compiles to:\n// 1. LOAD  counter into a register\n// 2. ADD   1 to the register\n// 3. STORE the register back\n\nThread A: LOAD (reads 0)\nThread B: LOAD (reads 0)      ← both hold stale 0\nThread A: ADD, STORE → counter = 1\nThread B: ADD, STORE → counter = 1   ← A's increment ERASED</pre><p>Two increments, result 1. That's a <b>race condition</b>: correctness depends on which interleaving the scheduler happens to produce — different every run, worst kind of bug to reproduce.</p><h3>Fix 1: mutex — one thread at a time</h3><pre>#include &lt;mutex&gt;\n\nstd::mutex m;\nint counter = 0;\n\nvoid increment() {\n    std::lock_guard&lt;std::mutex&gt; lock(m);  // acquires m; blocks others\n    counter++;                              // safe: exclusive access\n}   // lock released HERE by lock_guard's destructor — RAII again!</pre><p>Why <code>lock_guard</code> instead of manual <code>m.lock()/m.unlock()</code>: if the code between lock and unlock throws or returns early, manual unlock never runs and every other thread blocks forever. <code>lock_guard</code> is Lesson 6's RAII applied to locking — the destructor guarantees release on every path.</p><p><code>unique_lock</code> is its flexible sibling: supports deferred locking, manual unlock/relock — and is <i>required</i> by condition variables, which must unlock while sleeping.</p><h3>Condition variables: sleep until there's work</h3><pre>std::condition_variable cv;\nstd::mutex m;\nbool ready = false;\n\n// Waiting thread — sleeps, no CPU burned:\nstd::unique_lock&lt;std::mutex&gt; lock(m);\ncv.wait(lock, []{ return ready; });   // unlocks + sleeps; on notify,\n                                        // relocks and rechecks ready\n\n// Notifying thread:\n{ std::lock_guard&lt;std::mutex&gt; lock(m); ready = true; }\ncv.notify_one();</pre><p>Without this you'd busy-wait (<code>while(!ready){}</code>) — burning a full core polling. Condition variables are the building block of the thread pool in Lesson 19.</p><h3>Deadlock: the other classic</h3><pre>Thread A: lock(m1); ... wants m2\nThread B: lock(m2); ... wants m1     ← both wait forever</pre><p>Circular waiting. The standard fix: every thread acquires multiple locks in the <b>same global order</b> (always m1 before m2) — cycles become impossible. Or <code>std::scoped_lock lock(m1, m2);</code> which acquires both atomically with deadlock avoidance built in.</p><p><b>Try it:</b> take your broken counter from Lesson 14 and fix it three ways over the next two lessons: (1) mutex + lock_guard now — verify 2,000,000 exactly; (2) deliberately construct the two-mutex deadlock and watch it hang; (3) fix the deadlock via lock ordering. Atomics (fix #3's cousin) are next lesson.</p>",
keyPoints:["`counter++` = 3 machine steps; interleaving loses updates.","`lock_guard` is RAII for locking — exception-safe unlock.","`unique_lock` for condition variables and manual control.","Deadlock fix: consistent global lock ordering."]},

{id:18,week:7,weekTheme:"Concurrency",topic:"Concurrency",title:"Atomics, CAS & volatile",
teaser:"Hardware-indivisible ops and the volatile trap.",
body:"<p>Mutexes work, but a blocked thread means a context switch — microseconds of latency. HFT hot paths often use <b>atomics</b> instead: hardware-level indivisible operations. This is Citadel-interview bread and butter.</p><h3>The third fix for the broken counter</h3><pre>#include &lt;atomic&gt;\n\nstd::atomic&lt;int&gt; counter{0};\n\nvoid increment() {\n    counter++;        // now GENUINELY atomic — no mutex needed\n}\n// Two threads × 1M increments → exactly 2,000,000. Always.</pre><p>How? <code>counter++</code> on an atomic compiles to a special CPU instruction (x86: <code>LOCK XADD</code>) that performs load-add-store as <b>one indivisible hardware step</b>. No other core can observe or interleave with it mid-flight. No lock, no blocking, no context switch.</p><h3>The atomic toolkit</h3><pre>std::atomic&lt;int&gt; x{0};\nx.store(5);                  // atomic write\nint v = x.load();            // atomic read\nint old = x.fetch_add(3);    // atomic +=, returns the OLD value\nint prev = x.exchange(9);    // atomic swap-in, returns old</pre><h3>CAS: the building block of lock-free code</h3><p><b>Compare-And-Swap</b> — the operation everything fancier is built from:</p><pre>std::atomic&lt;int&gt; value{5};\nint expected = 5;\nbool ok = value.compare_exchange_strong(expected, 10);\n// Atomically: \"IF value still == expected (5), set it to 10, return true.\n//              ELSE: put the actual current value into expected,\n//                    return false — so I can retry.\"</pre><p>The lock-free pattern is an optimistic retry loop:</p><pre>// atomically double a counter, lock-free:\nint cur = value.load();\nwhile (!value.compare_exchange_strong(cur, cur * 2)) {\n    // CAS failed → another thread changed value; cur now holds\n    // the fresh value — loop and try again with it\n}</pre><p>No thread ever <i>blocks</i> — a losing thread just retries. \"Lock-free\" is that formal progress guarantee (someone always makes progress), not \"no waiting ever\": under heavy contention, retry loops still spin.</p><h3>The trap question: volatile</h3><pre>volatile int flag;   // ✗ NOT thread-safe. At all.</pre><p><code>volatile</code> only tells the <i>compiler</i> \"don't optimize away or reorder accesses to this\" — it exists for memory-mapped hardware registers. It provides zero atomicity and zero cross-thread ordering. Java's volatile <i>does</i> have sync semantics, which is why interviewers love this trap on people with mixed backgrounds. In C++: threads → <code>std::atomic</code>, hardware registers → <code>volatile</code>. Full stop.</p><h3>Memory ordering — know it exists</h3><p>CPUs and compilers reorder instructions for speed; other threads can observe those reorderings. <code>std::atomic</code> defaults to <code>seq_cst</code> — one global order all threads agree on, the safe choice. Relaxed orderings (<code>acquire</code>/<code>release</code>/<code>relaxed</code>) buy hot-path performance at the cost of subtle reasoning — for interviews, naming the default and why it's sane is usually enough.</p><p><b>Try it:</b> fix the Lesson 14 counter with <code>std::atomic&lt;int&gt;</code> and verify exactness. Then write the CAS doubling loop and reason through: what happens if two threads run it simultaneously? Trace both interleavings — one CAS fails and retries, and the final result is correct either way. That trace IS lock-free thinking.</p>",
keyPoints:["Atomics = hardware-indivisible ops; no other thread sees them half-done.","CAS + retry loop = optimistic, lock-free updates.","`volatile` provides ZERO thread safety — classic trap.","Default `seq_cst` ordering is the sane, strict choice."]},

{id:19,week:8,weekTheme:"Concurrency applied",topic:"Concurrency",title:"Thread Pools & Timed Schedulers",
teaser:"The scenario question: callbacks after T ms, with cancel.",
body:"<p>Your InterviewDB scenario question, verbatim: \"Implement a scheduler: given time T, trigger a callback after T milliseconds. Implement cancel. What are the performance concerns of a multithreaded solution?\" This lesson assembles it from Lessons 14, 17, and 18.</p><h3>Step 1: a thread pool (the foundation)</h3><p>Spawning a fresh OS thread per task is expensive. A pool starts N workers once; they loop pulling tasks from a shared queue:</p><pre>class ThreadPool {\n    std::vector&lt;std::thread&gt; workers_;\n    std::queue&lt;std::function&lt;void()&gt;&gt; tasks_;\n    std::mutex m_;\n    std::condition_variable cv_;\n    bool stop_ = false;\n\n    void workerLoop() {\n        while (true) {\n            std::function&lt;void()&gt; task;\n            {\n                std::unique_lock&lt;std::mutex&gt; lock(m_);\n                cv_.wait(lock, [this]{ return stop_ || !tasks_.empty(); });\n                if (stop_ && tasks_.empty()) return;\n                task = std::move(tasks_.front());\n                tasks_.pop();\n            }             // ← lock released HERE, before running\n            task();       // run OUTSIDE the lock — critical!\n        }\n    }\npublic:\n    ThreadPool(size_t n) {\n        for (size_t i = 0; i &lt; n; ++i)\n            workers_.emplace_back([this]{ workerLoop(); });\n    }\n    void enqueue(std::function&lt;void()&gt; t) {\n        { std::lock_guard&lt;std::mutex&gt; lock(m_); tasks_.push(std::move(t)); }\n        cv_.notify_one();\n    }\n};</pre><p>The one rule interviewers watch for: <b>run the task outside the lock</b>. Hold it during execution and every other worker blocks for the task's whole duration.</p><h3>Step 2: add timing — a min-heap by trigger time</h3><pre>struct ScheduledTask {\n    std::chrono::steady_clock::time_point when;\n    std::function&lt;void()&gt; callback;\n    std::shared_ptr&lt;std::atomic&lt;bool&gt;&gt; cancelled;\n    bool operator&gt;(const ScheduledTask& o) const { return when &gt; o.when; }\n};\nstd::priority_queue&lt;ScheduledTask, std::vector&lt;ScheduledTask&gt;,\n                    std::greater&lt;&gt;&gt; heap_;   // min-heap: soonest on top</pre><p>A dedicated scheduler thread: sleep until the top task's time (wake early if a sooner task arrives — condition variable again), pop ready tasks, hand them to the pool. The scheduler thread <b>never runs callbacks itself</b> — one slow callback would delay every subsequent task.</p><h3>Step 3: cancel — the elegant dodge</h3><p>A heap can't efficiently remove from the middle. So don't:</p><pre>auto flag = std::make_shared&lt;std::atomic&lt;bool&gt;&gt;(false);\nschedule(when, callback, flag);   // store flag with the task\n// cancel() is just:\n*flag = true;                      // O(1), no heap surgery\n// scheduler, before firing:  if (*task.cancelled) skip;</pre><p><b>Lazy cancellation</b>: mark it dead, skip it when it surfaces. This pattern appears all over real systems.</p><h3>Step 4: the performance-concerns half (where candidates stop too early)</h3><pre>1. LOCK CONTENTION: every enqueue/dequeue fights for one mutex.\n   → shard into per-worker queues, or a lock-free queue (L18).\n2. WAKE-UP JITTER: OS wake-ups aren't instant (µs-ms variance).\n   → for sub-ms precision, busy-poll a pinned core — deliberate\n     CPU-for-latency trade, standard in HFT.\n3. DEAD ENTRIES: cancelled tasks linger in the heap until due.\n   → periodic compaction if cancellation is heavy.\n4. SLOW CALLBACKS: never on the scheduler thread (see step 2).</pre><p><b>Try it:</b> build the ThreadPool and push 100 print-tasks through it. Then add the timed heap and schedule callbacks at staggered delays with one cancelled mid-flight. This is the single most complete \"build something real\" exercise in the course — budget a weekend session for it.</p>",
keyPoints:["Pool = shared queue + condvar; run tasks outside the lock.","Scheduler = min-heap by time; dispatch to pool, never execute inline.","Cancellation = lazy flag-and-skip, not heap surgery.","Concerns: lock contention, wake-up latency, one consistent answer for each."]},

{id:20,week:8,weekTheme:"Concurrency applied",topic:"Performance",title:"External Sort & K-Way Merge",
teaser:"N sorted files, none fits in memory. Merge them.",
body:"<p>Scenario question from your PDF: \"N sorted log files, no single file fits in memory. Merge them into one sorted file.\" The trap is the memory constraint; the escape is realizing how little you actually need in RAM.</p><h3>The insight</h3><p>The next element of the merged output is always the smallest among the N files' <i>current front elements</i>. You never need anything else in memory — just N values, one per file.</p><h3>Walk through it</h3><pre>File A: 1, 5, 9, 20      File B: 2, 3, 8      File C: 4, 6, 7\n\nmin-heap (one entry per file): [1(A), 2(B), 4(C)]\n\npop 1 → write to output → refill from A → [2(B), 4(C), 5(A)]\npop 2 → write            → refill from B → [3(B), 4(C), 5(A)]\npop 3 → write            → refill from B → [4(C), 5(A), 8(B)]\npop 4 → write            → refill from C → ...\n\nOutput: 1, 2, 3, 4, ...   Memory used: THREE values. Ever.</pre><p>The refill rule is the crux: after popping the min, read the next element <b>from the same file the min came from</b> — the heap must always hold every file's current front.</p><h3>The code</h3><pre>#include &lt;queue&gt;\n#include &lt;fstream&gt;\n#include &lt;vector&gt;\n\nstruct Entry {\n    int value; int file;\n    bool operator&gt;(const Entry& o) const { return value &gt; o.value; }\n};\n\nvoid mergeK(std::vector&lt;std::ifstream&gt;& files, std::ofstream& out) {\n    std::priority_queue&lt;Entry, std::vector&lt;Entry&gt;,\n                        std::greater&lt;&gt;&gt; heap;   // min-heap\n    for (int i = 0; i &lt; (int)files.size(); ++i) {   // prime: one per file\n        int v;\n        if (files[i] &gt;&gt; v) heap.push({v, i});\n    }\n    while (!heap.empty()) {\n        auto [value, idx] = heap.top(); heap.pop();\n        out &lt;&lt; value &lt;&lt; \"\\n\";\n        int next;\n        if (files[idx] &gt;&gt; next) heap.push({next, idx});  // SAME file\n    }\n}</pre><h3>Complexity — say it precisely</h3><pre>Memory: O(N)               — N buffered values + heap of N. NOT data size.\nTime:   O(total × log N)   — each element: one push + one pop, O(log N)\n                              (heap has N entries, not 'total')</pre><h3>The follow-up: data not sorted at all?</h3><p>Full <b>external sort</b> (100GB file, 8GB RAM): (1) <b>split</b> — read 8GB chunks, sort each in memory, write each out as a sorted \"run\"; (2) <b>merge</b> — k-way merge the runs with the heap above. This two-phase pattern is the backbone of every big-data sort (MapReduce shuffle included) — naming that connection is a nice flourish.</p><p><b>Try it:</b> create 3 small sorted text files and implement mergeK. Verify against <code>sort -nm a.txt b.txt c.txt</code>. Then say aloud, from memory: why is memory O(N) and not O(total)? That sentence is the interview answer.</p>",
keyPoints:["Min-heap of size N (files), never total data size.","Pop min → write → refill from the same file.","O(total × log N) time, O(N) memory.","Unsorted data: chunk-sort-spill, then merge the runs."]},

{id:21,week:9,weekTheme:"Low-latency C++",topic:"Memory",title:"Defragmentation & Custom Allocators",
teaser:"memmove vs memcpy, arenas, and pools.",
body:"<p>Your PDF contains this exact signature: <code>size_t defragment(std::vector&lt;T*&gt;& objects, void* bufBegin);</code> — a real senior-level question combining Lessons 3, 5, and memory layout. Let's build it, then meet the allocators that make it unnecessary.</p><h3>The problem: fragmentation</h3><pre>After lots of alloc/free churn:\n+------+------+------+------+------+------+\n| obj0 | FREE | obj1 | FREE | obj2 | FREE |\n+------+------+------+------+------+------+\nPlenty of TOTAL free space — but scattered. A large\nallocation fails even though the bytes exist.</pre><p>Defragmenting = sliding live objects together so free space consolidates:</p><pre>+------+------+------+---------------------+\n| obj0 | obj1 | obj2 |        FREE          |\n+------+------+------+---------------------+</pre><h3>The implementation</h3><pre>template &lt;class T&gt;\nsize_t defragment(std::vector&lt;T*&gt;& objects, void* bufBegin) {\n    T* buffer = static_cast&lt;T*&gt;(bufBegin);\n    for (size_t i = 0; i &lt; objects.size(); ++i) {\n        T* target = buffer + i;          // packed position for object i\n        if (objects[i] != target) {\n            std::memmove(target, objects[i], sizeof(T));  // ← memMOVE\n            objects[i] = target;          // update the tracking pointer\n        }\n    }\n    return objects.size() * sizeof(T);    // bytes now contiguous\n}</pre><p>Three test points hidden inside: <b>(1) memmove, not memcpy</b> — we're sliding objects within one buffer, so source and destination can overlap; memcpy on overlap is UB, memmove picks a safe copy direction. <b>(2) Update the pointers</b> — the vector must track the new locations. <b>(3) The caveat to volunteer</b>: raw-byte relocation is only safe for <i>trivially copyable</i> types. A <code>std::string</code> member (with SSO internals, Lesson 9) would break — for general T you'd placement-new a moved copy at the target and destroy the original. Volunteering that unprompted is the senior signal.</p><h3>The better idea: don't fragment in the first place</h3><p><b>Arena (bump) allocator</b> — allocation is one pointer addition:</p><pre>class Arena {\n    char* buf_; size_t size_, offset_ = 0;\npublic:\n    Arena(size_t n) : buf_(new char[n]), size_(n) {}\n    void* allocate(size_t n) {\n        if (offset_ + n &gt; size_) return nullptr;\n        void* p = buf_ + offset_;\n        offset_ += n;                  // \"allocation\" = this line\n        return p;\n    }\n    void reset() { offset_ = 0; }      // free EVERYTHING at once\n    ~Arena() { delete[] buf_; }\n};</pre><p>Nanosecond allocation, zero fragmentation, zero per-object bookkeeping. The constraint: no individual frees — the whole arena resets together. Perfect when lifetimes group naturally: \"all scratch objects for processing this one market-data event, freed when the event completes.\"</p><p><b>Object pool</b>: pre-allocate N same-size slots + a free list of empties. Alloc = pop a slot, free = push it back — O(1) both ways, fragmentation impossible. The other workhorse of low-latency C++.</p><p><b>Try it:</b> implement defragment and test with ints scattered through a manually-managed buffer. Then build Arena and allocate a few objects from it via placement new (Lesson 5 — see how it all connects?). Finally, answer aloud: why does the general-purpose allocator HAVE to be slower than these? (It handles arbitrary sizes, arbitrary lifetimes, and thread safety — generality costs.)</p>",
keyPoints:["`memmove` handles overlap; `memcpy` on overlap is UB.","Raw-byte relocation only valid for trivially copyable types.","Arena: pointer-bump alloc, bulk free — for grouped lifetimes.","Pool: fixed-size slots + free list — no fragmentation, fixed capacity."]},

{id:22,week:9,weekTheme:"Low-latency C++",topic:"Performance",title:"CPU Caches & False Sharing",
teaser:"Why identical Big-O can differ 100x — the HFT secret sauce.",
body:"<p>This is the lesson that separates HFT interviews from normal ones. Big-O treats all memory accesses as equal. Hardware disagrees — by a factor of ~100.</p><h3>The hierarchy — internalize these magnitudes</h3><pre>registers   ~0 cycles     a handful of values\nL1 cache    ~4 cycles     ~32-64 KB\nL2 cache    ~12 cycles    ~256KB-1MB\nL3 cache    ~40 cycles    a few MB, shared across cores\nRAM         ~100-300 cycles\n\nA RAM access costs the CPU the chance to run HUNDREDS of\ninstructions. The cache hierarchy exists to hide that cliff.</pre><h3>Cache lines: memory moves in 64-byte chunks</h3><p>The CPU never fetches one byte — it fetches the whole 64-byte <b>cache line</b> containing it. Touch <code>v[0]</code> (an int) and <code>v[1]</code>..<code>v[15]</code> arrive too, for free:</p><pre>vector&lt;int&gt; (contiguous):\n[v0 v1 v2 ... v15][v16 ... v31] ...\n └─ one fetch, 16 elements ─┘     scans are ~free after fetch #1\n\nlist&lt;int&gt; (nodes scattered on the heap):\n[10]→ ...somewhere far... →[20]→ ...far... →[30]\n each step: pointer-chase → likely cache MISS → ~200 cycles</pre><p>Both traversals are \"O(n).\" The vector is often <b>10-100x faster</b>. When an interviewer asks \"vector or list, and why?\" — this, not Big-O, is the answer they're fishing for. (It also re-explains deque's tradeoff from Lesson 11 and the TLB-locality advice from Lesson 13 — same principle everywhere.)</p><h3>False sharing — the classic multithreaded performance trap</h3><p>Setup: two threads, each hammering its <i>own</i> counter. No shared data, no race. And yet it crawls:</p><pre>struct Counters {\n    std::atomic&lt;int&gt; a;   // thread A's counter ─┐ SAME 64-byte\n    std::atomic&lt;int&gt; b;   // thread B's counter ─┘ cache line!\n};</pre><p>Cache coherence works at line granularity: when core A writes <code>a</code>, every other core's copy of that <i>entire line</i> is invalidated — including core B's, which only cares about <code>b</code>. The two cores ping-pong the line back and forth on every write. No correctness bug. Brutal, silent throughput collapse.</p><pre>struct Fixed {\n    alignas(64) std::atomic&lt;int&gt; a;   // forced onto its own line\n    alignas(64) std::atomic&lt;int&gt; b;   // its own line too\n};   // threads now never touch each other's lines — problem gone</pre><p>Detection: Linux <code>perf c2c</code> surfaces cache-line contention; suspicion trigger is \"per-thread data that lives side by side in one struct/array.\"</p><p><b>Try it:</b> time summing 10M elements in a <code>vector&lt;int&gt;</code> vs a <code>list&lt;int&gt;</code> — measure the gap yourself. Then build both Counters versions above with two threads doing 10M increments each, and time them. Seeing false sharing cost you 2-5x on your own machine makes it unforgettable — and \"I measured it\" is a great interview sentence.</p>",
keyPoints:["Cache lines are 64 bytes; locality makes sequential access ~free.","vector beats list on constant factors, not Big-O.","False sharing: unrelated per-thread data sharing a line = coherence storm.","Fix with `alignas(64)` padding; detect with `perf c2c`."]},

{id:23,week:10,weekTheme:"Integration",topic:"Performance",title:"Company Patterns & C++'s Big Difference",
teaser:"Where each firm leans, and the 'vs other languages' answer.",
body:"<p>Week 10 begins: stop learning new material, start allocating review time strategically. Different firms lean on different parts of this course.</p><h3>Firm-by-firm leans (directional — verify per-desk on Glassdoor/Blind)</h3><p><b>Jane Street</b> — deep C++ mechanics with relentless \"why\" chains. One topic, five levels deep: why is emplace_back faster? → what does placement new do? → what alignment guarantees does operator new make? → implement vector's grow(). <i>Re-drill: Lessons 5, 7, 8.</i> Their style: a correct-but-shallow answer gets probed until you go deeper or hit bottom — so practice the second level of every answer.</p><p><b>HRT</b> — broad systems coverage, evenly weighted: cache behavior, TLB, virtual memory, networking, OS, concurrency. Your InterviewDB PDF reads like an HRT phone screen. <i>Re-drill: Lessons 13, 14, 15, 17, 22.</i></p><p><b>Citadel Securities</b> — atomics, lock-free thinking, latency-focused multithreading, TCP/UDP internals, memory layout. <i>Re-drill: Lessons 15, 17, 18, 19, 22, 24.</i></p><p><b>Jump</b> — Linux/kernel depth, CPU internals, networking down to the metal (their reputation: happily going a layer below everyone else). <i>Re-drill: Lessons 13, 14, 16, 22 — and be comfortable saying \"the kernel handles that; here's roughly how.\"</i></p><h3>The cross-cutting question: \"What's most different about C++?\"</h3><p>Asked at all of them in some form (\"vs Python?\" \"vs Java?\"). The weak answer is \"it's faster.\" The strong answer has two named pillars:</p><pre>1. DETERMINISTIC RESOURCE MANAGEMENT\n   RAII (L6): resources release at scope exit, at a knowable\n   moment. No garbage collector → no surprise pauses. A GC\n   pause mid-hot-path is an unbounded latency spike you\n   cannot schedule around — disqualifying for HFT.\n\n2. ZERO-COST ABSTRACTIONS\n   Templates (L12), inlining, vector — high-level code that\n   compiles to the same machine code you'd write by hand.\n   Python's abstractions cost interpreter overhead; C++'s\n   compile away.</pre><p>Then the Java-specific follow-up from your PDF — \"Java vs C++ garbage collection?\": Java's GC finds and frees unreachable objects automatically at runtime (convenient, pause-prone); C++ has none — lifetime is explicit via RAII/smart pointers (deterministic, and the programmer's responsibility). One sentence each, then the punchline: that determinism is <i>why</i> this industry pays for C++ engineers.</p><h3>Your week-10 drill routine</h3><pre>Day 1-2: your target firm's re-drill list above, out loud\nDay 3:   the app's Review queue to zero; retake weak-topic quizzes\nDay 4:   the three build-it exercises you skipped (be honest)\nDay 5:   full InterviewDB PDF cold, 90 seconds per question, spoken\nWeekend: rest. Fatigue costs more than one more cram day buys.</pre><p><b>Try it:</b> record yourself (phone voice memo) answering \"walk me through what happens when I push_back into a full vector\" for 90 seconds. Listen back. Every \"um, I think\" is a spot for one more rep — verbal fluency under pressure is trained, not innate.</p>",
keyPoints:["Know your target firm's lean; verify with current interview reports.","C++'s pitch: RAII determinism + zero-cost abstractions.","No GC = no surprise pauses — the HFT reason.","Every answer has a second level; volunteer it before being asked."]},

{id:24,week:10,weekTheme:"Integration",topic:"Memory",title:"Sizes, Alignment & Padding",
teaser:"The 'how many bytes?' family of questions.",
body:"<p>Your question bank has a whole family of \"how many bytes?\" questions. They're all one concept — alignment — plus careful arithmetic. Learn the concept once, ace the family.</p><h3>What alignment means</h3><p>\"Memory is 8-byte aligned\" = an 8-byte value must start at an address divisible by 8. Why: the CPU and memory bus fetch data in aligned chunks; a misaligned value can straddle two fetches (slow) or fault outright on some architectures. Every type has an alignment requirement — typically its own size: <code>char</code>→1, <code>int</code>→4, <code>double</code>/pointers→8.</p><h3>Struct padding — see it, then predict it</h3><pre>struct S1 { int a; char b; };\nsizeof(S1) == 8   // not 5!\n// layout: [a a a a][b][pad pad pad]\n// padded to a multiple of the largest member's alignment (4),\n// so in an S1 array every element's int stays 4-aligned\n\nstruct S3 { char x; double d; char y; };\nsizeof(S3) == 24  // [x][7 pad][d×8][y][7 pad]\nstruct S4 { double d; char x; char y; };\nsizeof(S4) == 16  // same data, reordered: [d×8][x][y][6 pad]\n// Member ORDER changes struct size — real optimization, real question.</pre><p>Print <code>sizeof</code> and <code>alignof</code> for all of these — two minutes, permanent intuition.</p><h3>Worked interview problems (from your notes, solved slowly)</h3><p><b>Q: Array of 1000 ints, values 0-1,000,000. Bytes?</b></p><pre>Step 1: what fits 1,000,000?  2^20 ≈ 1.05M → needs 20 bits.\n        16-bit max = 65,535 → too small. 32-bit int → fits.\nStep 2: 1000 × 4 = 4000 bytes.\nBonus:  \"bit-packed it'd be ~2500 bytes (20 bits × 1000), but\n        standard types round to byte/word boundaries for\n        addressability — 4000 in practice.\"</pre><p><b>Q: Linked list, 1000 nodes, each {int value; Node* next}. Total?</b></p><pre>Naive:   4 + 8 = 12 → 12,000 bytes        ✗ incomplete\nAligned: the 8-byte pointer needs 8-alignment → 4 pad bytes\n         after the int → sizeof(Node) = 16 → 16,000 bytes  ✓\nGreat answer adds: \"...plus per-allocation heap overhead if\nnodes are new'd individually — and terrible cache behavior\nvs a vector (Lesson 22).\"</pre><p><b>Q: sizeof(struct {int; char;})?</b> — 8, walked through above. Always narrate the padding logic, not just the number: the reasoning is what's graded.</p><p><b>Try it:</b> without compiling, predict sizeof for <code>{char, char, int}</code>, <code>{char, int, char}</code>, <code>{int*, char}</code>, and <code>{char[3], short}</code>. Then verify with a program. Score 4/4 and this question family is retired.</p>",
keyPoints:["Alignment: start addresses divisible by the type's requirement.","struct{int;char;} = 8 bytes (padding), not 5.","1000 ints (values ≤1M) = 4000 bytes — bits needed ≠ bytes used.","{int + ptr} node pads 12 → 16 bytes on 64-bit."]},

{id:25,week:10,weekTheme:"Integration",topic:"Pointers & Language",title:"Classic Implementation Drills",
teaser:"itoa, stack-from-queues, and the pointer-to-pointer fill-in.",
body:"<p>Final lesson: the four short implementation drills that recur across every firm's early rounds. Write each one yourself — they're small enough to whiteboard, which is exactly how you'll face them.</p><h3>Drill 1: itoa (int → string, no library help)</h3><pre>std::string itoa(int value) {\n    if (value == 0) return \"0\";\n    bool negative = value &lt; 0;\n    // careful: -INT_MIN overflows int → work in unsigned\n    unsigned v = negative ? -static_cast&lt;unsigned&gt;(value) : value;\n    std::string result;\n    while (v &gt; 0) {\n        result += static_cast&lt;char&gt;('0' + v % 10);  // last digit\n        v /= 10;                                      // drop it\n    }\n    if (negative) result += '-';\n    std::reverse(result.begin(), result.end());\n    return result;\n}</pre><p>The logic: <code>% 10</code> peels digits least-significant-first, so you build the string backward and reverse once at the end. The INT_MIN detail (you can't negate it as an int) is a bonus point most candidates miss.</p><h3>Drill 2: stack using queues (LIFO from FIFO)</h3><pre>class StackFromQueue {\n    std::queue&lt;int&gt; q_;\npublic:\n    void push(int x) {              // O(n)\n        q_.push(x);\n        // rotate: everything that was there moves behind x\n        for (size_t i = 0; i + 1 &lt; q_.size(); ++i) {\n            q_.push(q_.front());\n            q_.pop();\n        }\n    }\n    int pop() {                     // O(1)\n        int v = q_.front(); q_.pop(); return v;\n    }\n};\n// push 1,2,3 → queue after rotations: [3,2,1] → pop gives 3. LIFO ✓</pre><p>The rotate-on-push trick keeps the newest element at the front, so the queue's natural dequeue becomes the stack's pop. (The mirror version — O(1) push, O(n) pop — is equally valid; know both exist.)</p><h3>Drill 3: the pointer-to-pointer fill-in (your PDF's blanks question)</h3><pre>void fct(const char** s) {   // Blank1: takes ADDRESS OF a pointer\n    *s = \"Hello!\";           // Blank2: write through it\n}\nint main() {\n    const char* str;\n    fct(&str);               // Blank3: pass the pointer's address\n    printf(\"%s\\n\", str);    // prints Hello!\n}</pre><p>Why the double pointer: to modify the caller's <i>pointer variable itself</i> (not what it points at), the function needs that variable's address — Lesson 2's \"a pointer is just a variable\" logic applied to a pointer. This exact pattern is also how C APIs return allocated buffers.</p><h3>Drill 4: implement malloc (design sketch — asked as discussion)</h3><pre>Heap = big region + a FREE LIST (linked list of free blocks,\neach with a size header):\n\n[hdr|used 32B][hdr|FREE 64B]→[hdr|FREE 128B]→null\n\nmalloc(n): walk free list → first block ≥ n (first-fit)\n           → split off the excess as a new free block\nfree(p):   mark block free, insert into list\n           → COALESCE with adjacent free neighbors\n             (else fragmentation eats the heap — Lesson 21)</pre><p>Follow-ups to expect: first-fit vs best-fit (speed vs fragmentation), where the header lives (just before the returned pointer — that's how free finds the size), and thread safety (a lock, or per-thread arenas — Lesson 21 again).</p><p><b>Try it:</b> whiteboard (paper, no compiler) itoa and the stack-from-queue, then type and test them. Under 15 minutes each with working code = interview-ready. You've now closed the loop on every coding question in your original PDF.</p>",
keyPoints:["itoa: %10 / /10 digits backward, then reverse.","Stack-from-queue: rotate on push → O(n) push, O(1) pop.","Modifying a caller's pointer requires passing `&ptr` (pointer-to-pointer).","DIY malloc = free list + split + coalesce."]}
];
