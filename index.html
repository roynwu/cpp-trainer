const QUESTIONS = [
/* ---- Memory (L1,3,5,21,24) ---- */
{id:"m1",topic:"Memory",lesson:1,q:"What's the difference between a program and a process?",choices:["They're the same thing once compiled","A program is a passive file on disk; a process is a running instance with its own address space","A process is the source code; a program is the binary","A program runs in RAM; a process runs on disk"],answer:1,explain:"A program is inert bytes on disk. Running it makes the OS create a process: a live instance with its own virtual address space, resources, and execution state. One program can back many processes."},
{id:"m2",topic:"Memory",lesson:1,q:"Does the CPU execute C++ source code?",choices:["Yes, modern CPUs parse C++ directly","Only simple statements like arithmetic","No — it executes machine instructions produced by the compiler","Only if the program is interpreted"],answer:2,explain:"CPUs only understand machine instructions. The compiler translates C++ into machine code; the CPU runs its fetch-decode-execute cycle over those instructions."},
{id:"m3",topic:"Memory",lesson:3,q:"Why is stack allocation faster than heap allocation?",choices:["The stack is stored in a faster type of RAM","Stack allocation is just moving the stack pointer; heap allocation requires allocator bookkeeping","The heap is on disk until needed","Stack memory is compressed"],answer:1,explain:"Allocating on the stack is a pointer bump — one instruction. The heap allocator must search free blocks, split them, and do bookkeeping (possibly with locking). Same RAM, very different work."},
{id:"m4",topic:"Memory",lesson:3,q:"What's wrong with: `int* f() { int x = 5; return &x; }`",choices:["Nothing — it returns a valid pointer","x should be declared const","It returns a dangling pointer — x's stack frame is destroyed when f returns","It leaks memory"],answer:2,explain:"x lives in f's stack frame, which is popped on return. The pointer still holds an address, but the memory is no longer valid — using it is undefined behavior."},
{id:"m5",topic:"Memory",lesson:3,q:"For a local `std::vector<int> v(1000);`, where do the vector object and its elements live?",choices:["Both on the stack","Both on the heap","Object on the stack; the 1000 ints on the heap","Object on the heap; the ints on the stack"],answer:2,explain:"The vector object itself (pointer + size + capacity, ~24 bytes) is a local on the stack; the element buffer it manages is heap-allocated internally."},
{id:"m6",topic:"Memory",lesson:5,q:"What does `new` do that `malloc` doesn't?",choices:["Allocates from a separate, faster heap","Constructs the object (runs the constructor) in addition to allocating","Zero-initializes all memory","Registers memory with the garbage collector"],answer:1,explain:"new = allocate + construct, returns a typed pointer, throws bad_alloc on failure. malloc only returns raw uninitialized bytes as void*. That's also why free on a new-ed object skips the destructor."},
{id:"m7",topic:"Memory",lesson:5,q:"What happens if you `free()` memory that was allocated with `new`?",choices:["It works fine — they use the same allocator","The destructor is skipped and behavior is undefined","The compiler converts it to delete automatically","Only a small performance penalty"],answer:1,explain:"free knows nothing about C++ objects: no destructor runs (leaking whatever it managed), and the allocator families may not match — undefined behavior. Never mix new/delete with malloc/free."},
{id:"m8",topic:"Memory",lesson:5,q:"What is placement new used for?",choices:["Allocating arrays at aligned addresses","Constructing an object at a memory address you already own, with no allocation","Placing objects in read-only memory","A faster version of new for small objects"],answer:1,explain:"Placement new separates 'get memory' from 'build object here' — used by vector, arenas, and pools. You must later call the destructor manually; there's no matching delete."},
{id:"m9",topic:"Memory",lesson:5,q:"Why doesn't `std::vector` use `new T[capacity]` internally?",choices:["new[] is deprecated in modern C++","new[] would construct every element immediately, but vector needs uninitialized spare capacity","new[] can't allocate more than 4KB","Arrays can't be resized with new[]"],answer:1,explain:"new[] default-constructs all elements and requires default-constructibility. Vector allocates raw capacity and placement-news elements one at a time, only as they're actually added."},
{id:"m10",topic:"Memory",lesson:5,q:"By default, how do `new` and `malloc` each signal allocation failure?",choices:["Both return NULL","Both throw exceptions","new throws std::bad_alloc; malloc returns NULL","new returns NULL; malloc aborts the program"],answer:2,explain:"new throws std::bad_alloc (unless you use new(std::nothrow)); malloc returns NULL, which you must check before dereferencing."},
{id:"m11",topic:"Memory",lesson:24,q:"What is `sizeof(struct { int a; char b; })` on a typical 64-bit system?",choices:["5 bytes","6 bytes","8 bytes","12 bytes"],answer:2,explain:"4 (int) + 1 (char) + 3 padding = 8. The struct is padded to a multiple of its largest member's alignment (4) so arrays of it keep every int aligned."},
{id:"m12",topic:"Memory",lesson:24,q:"An array of 1000 ints with values 0-1,000,000: how many bytes (using standard types)?",choices:["~2500 bytes","4000 bytes","8000 bytes","1,000,000 bytes"],answer:1,explain:"1,000,000 needs 20 bits — too big for 16-bit, fits in a 4-byte int. 1000 × 4 = 4000 bytes. (Bit-packing could theoretically hit ~2500, but standard types round to byte/word boundaries.)"},
{id:"m13",topic:"Memory",lesson:24,q:"A linked-list node holds an int and a next-pointer. Its realistic size on a 64-bit system?",choices:["12 bytes — 4 for int, 8 for pointer","16 bytes — padding aligns the 8-byte pointer","10 bytes","20 bytes"],answer:1,explain:"4 + 8 = 12 naively, but the pointer needs 8-byte alignment, so the int is padded out: 16 bytes per node. Flagging padding is the strong answer."},
{id:"m14",topic:"Memory",lesson:21,q:"Why must a buffer defragmenter use `memmove` instead of `memcpy`?",choices:["memmove is faster","memcpy can't copy more than one page","Source and destination can overlap in the same buffer — memcpy on overlap is undefined behavior","memmove also updates pointers automatically"],answer:2,explain:"Packing objects within one buffer means ranges can overlap. memmove picks a safe copy direction; memcpy assumes no overlap and is UB if they do."},
{id:"m15",topic:"Memory",lesson:21,q:"What's the core tradeoff of an arena (bump) allocator?",choices:["Slow allocation, but individual frees are fast","Pointer-bump-fast allocation, but you typically free the whole arena at once","It only works for strings","It requires garbage collection"],answer:1,explain:"Allocation is just advancing an offset — like the stack. The cost: no individual deallocation; the arena resets as a whole, so it fits workloads where lifetimes group naturally."},
{id:"m16",topic:"Memory",lesson:25,q:"Implementing your own malloc: what's the classic underlying data structure?",choices:["A balanced binary tree of allocations","A free list of blocks with size headers, with splitting and coalescing","A hash map from size to address","A stack of pages"],answer:1,explain:"A linked free list: search for a big-enough block (first/best fit), split leftovers, and on free, coalesce with adjacent free blocks to fight fragmentation."},

/* ---- Pointers & Language (L2,4,12,25) ---- */
{id:"p1",topic:"Pointers & Language",lesson:2,q:"What is a pointer, most precisely?",choices:["A reference to an object","A variable whose value is a memory address","A special CPU register","An index into the heap"],answer:1,explain:"That's the whole trick: it's just a variable holding an address. All the syntax (& to take an address, * to dereference) follows from that."},
{id:"p2",topic:"Pointers & Language",lesson:2,q:"On a 64-bit system, `sizeof(char*)` vs `sizeof(BigStruct*)`?",choices:["char* is smaller","Both are 8 bytes — a pointer is an address regardless of pointee","Depends on the struct size","BigStruct* is 16 bytes"],answer:1,explain:"A pointer stores an address, and addresses are the same width no matter what lives there. 8 bytes on 64-bit."},
{id:"p3",topic:"Pointers & Language",lesson:2,q:"How do you check if a system is little-endian?",choices:["Call std::endian_check()","Store 1 in a uint32_t and check if the first byte in memory is 1","Check if pointers are 8 bytes","Compare htons(1) with 1 at compile time"],answer:1,explain:"Reinterpret the int's address as unsigned char* and inspect byte 0. If it's 1, the least-significant byte is stored first: little-endian. (Comparing htons(1)==1 fails at compile time since it's a runtime call — the classic portable check is byte inspection.)"},
{id:"p4",topic:"Pointers & Language",lesson:4,q:"Which is TRUE of references but not pointers?",choices:["Can be reassigned to another object","Can be null","Must be bound at initialization and can never be reseated","Supports arithmetic"],answer:2,explain:"A reference is an alias fixed at birth. Pointers can be null, reassigned, and offset — references can't (in valid C++)."},
{id:"p5",topic:"Pointers & Language",lesson:4,q:"Can a reference be null?",choices:["Yes, references are nullable like pointers","No, and it's impossible under any circumstance","Not via valid C++ — though UB (e.g. binding through a null pointer dereference) can technically produce one","Only const references can be null"],answer:2,explain:"The complete answer has both halves: the language guarantees non-null references, but undefined behavior can violate it. Mentioning the nuance is the senior-signal move."},
{id:"p6",topic:"Pointers & Language",lesson:4,q:"When should a function take a pointer instead of a reference?",choices:["Never — references are always better","When 'no value' (nullptr) is a meaningful state, or reassignment/arithmetic is needed","When the argument is large","When the function is recursive"],answer:1,explain:"Pointers express optionality and reseatability. References express 'always a valid object.' Choose based on the contract you want the signature to state."},
{id:"p7",topic:"Pointers & Language",lesson:12,q:"Why must template definitions generally live in header files?",choices:["Linkers can't handle templates","The compiler needs the full definition at each call site to instantiate code for each concrete type","Headers compile faster","It's just convention"],answer:1,explain:"A template is a compile-time blueprint. Each translation unit that uses it must see the definition to generate the per-type instantiation."},
{id:"p8",topic:"Pointers & Language",lesson:12,q:"What is the guaranteed effect of `inline` in modern C++?",choices:["The function is always inlined at every call site","Permits identical definitions across translation units (linkage); actual inlining is up to the compiler","It makes the function constexpr","It removes the function from the symbol table"],answer:1,explain:"Compilers inline by their own heuristics with or without the keyword. inline's guaranteed modern meaning is about the One Definition Rule for header-defined functions."},
{id:"p9",topic:"Pointers & Language",lesson:12,q:"Why can a function call be slower than the same code inlined?",choices:["The stack is slower than the heap","Call/return overhead plus pipeline and branch-prediction disruption from the jump","Function code lives in slower memory","Calls always flush the TLB"],answer:1,explain:"Beyond the call/return bookkeeping, jumps introduce control-flow uncertainty that can stall the CPU's pipeline; inlined code is straight-line and freely optimizable across the boundary."},
{id:"p10",topic:"Pointers & Language",lesson:12,q:"With `const char* p`, which is illegal?",choices:["p = otherPtr;","*p = 'x';","reading *p","p++"],answer:1,explain:"const char* = pointer to const char: the pointee can't be modified, but p itself can be reassigned or incremented. (char* const is the reverse.) Read right-to-left."},
{id:"p11",topic:"Pointers & Language",lesson:25,q:"For `fct` to set the caller's `const char* str` to a new string, its parameter must be:",choices:["const char* s","const char& s","const char** s — the address of the pointer","char s[]"],answer:2,explain:"To modify the caller's pointer variable itself (not what it points at), you pass a pointer to the pointer, and assign via *s = \"Hello!\";. Call it as fct(&str)."},
{id:"p12",topic:"Pointers & Language",lesson:25,q:"In `itoa`, why do you reverse the string at the end?",choices:["To handle negative numbers","% 10 produces digits least-significant-first","To remove leading zeros","C strings are stored backwards"],answer:1,explain:"Repeated %10 / /10 peels digits from the ones place upward, building the number backward — one reverse at the end fixes it."},

/* ---- RAII & Move (L6,7) ---- */
{id:"r1",topic:"RAII & Move",lesson:6,q:"What is RAII?",choices:["A reference-counting garbage collection scheme","Tying a resource's lifetime to an object: acquire in constructor, release in destructor","A memory alignment technique","Windows-only exception handling"],answer:1,explain:"Resource Acquisition Is Initialization. Destructors run deterministically at scope exit — even during exception unwinding — so cleanup is guaranteed on every path."},
{id:"r2",topic:"RAII & Move",lesson:6,q:"Why does C++ favor RAII over garbage collection?",choices:["GC is patented","RAII is deterministic — resources release at a known moment, with no unpredictable pauses","RAII uses less syntax","GC can't handle files"],answer:1,explain:"GC reclaims memory eventually and can pause unpredictably — unacceptable in latency-critical paths. RAII releases at scope exit, deterministically, and covers all resources (locks, sockets, files), not just memory."},
{id:"r3",topic:"RAII & Move",lesson:6,q:"In what order are member variables destroyed?",choices:["The order listed in the constructor's initializer list","Reverse of their declaration order in the class","Alphabetical","Unspecified"],answer:1,explain:"Construction follows declaration order (not initializer-list order — a classic trap); destruction is the exact reverse."},
{id:"r4",topic:"RAII & Move",lesson:6,q:"Why does a polymorphic base class need a virtual destructor?",choices:["To make the class abstract","So deleting via a base pointer runs the derived destructor too","Virtual destructors are faster","To allow multiple inheritance"],answer:1,explain:"Without it, delete through a base pointer only runs the base destructor — the derived class's cleanup is skipped: leaks/UB. Rule of thumb: any virtual function ⇒ virtual destructor."},
{id:"r5",topic:"RAII & Move",lesson:6,q:"A constructor throws halfway through. What happens to already-constructed members?",choices:["They leak — nothing is cleaned up","Their destructors run, in reverse construction order","The object's destructor runs","The program always terminates"],answer:1,explain:"Fully-built subobjects are destroyed in reverse order. The object itself was never fully constructed, so its own destructor is NOT called — but its pieces are cleaned up."},
{id:"r6",topic:"RAII & Move",lesson:7,q:"What does `std::move` actually do at runtime?",choices:["Copies the object to a new address","Nothing — it's a cast to an rvalue reference enabling move overloads","Deallocates the source","Swaps the two objects"],answer:1,explain:"std::move generates zero instructions itself. It tells overload resolution 'treat this as a temporary, stealing is allowed' — the selected move constructor/assignment does the actual work."},
{id:"r7",topic:"RAII & Move",lesson:7,q:"Why is moving a heap-backed object O(1) while copying is O(n)?",choices:["Move uses memcpy which is faster","Move steals the internal pointer and nulls the source; copy duplicates the whole buffer","The compiler parallelizes moves","Moves happen at compile time"],answer:1,explain:"Move is a pointer swap plus resetting the source to empty. Copy allocates a new buffer and copies every element."},
{id:"r8",topic:"RAII & Move",lesson:7,q:"Why is `emplace_back(a, b)` often faster than `push_back(Widget(a, b))`?",choices:["emplace_back skips bounds checking","It constructs the element in place in the vector's storage — no temporary + move","It allocates on the stack","It batches multiple insertions"],answer:1,explain:"push_back builds a temporary then move-constructs it into storage (two constructions); emplace_back forwards the args and placement-news directly in place (one)."},
{id:"r9",topic:"RAII & Move",lesson:7,q:"What state must a moved-from object be left in?",choices:["Destroyed — using it is UB","Bit-identical to before","Valid but unspecified — safe to destroy or reassign","Null"],answer:2,explain:"The standard requires validity (its destructor must be safe to run, you can assign to it), but its contents are unspecified — don't rely on its old value."},
{id:"r10",topic:"RAII & Move",lesson:7,q:"Why should move constructors be marked `noexcept`?",choices:["It's required syntax","Otherwise std::vector may copy instead of move during reallocation, for exception-safety","noexcept makes them inline","To prevent them being deleted"],answer:1,explain:"Vector's reallocation needs the strong exception guarantee; it only uses moves it knows can't throw. A throwing (non-noexcept) move makes it fall back to copies."},
{id:"r11",topic:"RAII & Move",lesson:7,q:"What is the Rule of Zero?",choices:["Never allocate memory","Prefer composing from RAII members so the compiler generates all five special functions","All classes need five special members","Constructors should take zero arguments"],answer:1,explain:"If your members (vector, string, unique_ptr) manage their own resources, you don't hand-write any of the destructor/copy/move quintet — less code, fewer bugs. The Rule of Five is for when you must."},

/* ---- STL (L8,9,10,11) ---- */
{id:"s1",topic:"STL",lesson:8,q:"What is the time complexity of `vector::push_back`?",choices:["Always O(1)","Always O(n)","Amortized O(1) — occasional O(n) reallocations, exponentially rarer as it grows","O(log n)"],answer:2,explain:"A push that exceeds capacity reallocates and moves everything: O(n). But geometric growth spreads that cost so n pushes total O(n) — amortized O(1) each. Say 'amortized' or expect a follow-up."},
{id:"s2",topic:"STL",lesson:8,q:"Push 100 elements into an empty vector (doubling growth). Roughly how many reallocations?",choices:["100","50","About 7 (1,2,4,8,16,32,64,128)","1"],answer:2,explain:"Reallocations happen at capacity boundaries: logarithmically many, not linearly. That's the entire point of geometric growth."},
{id:"s3",topic:"STL",lesson:8,q:"After `v.clear()`, what happens to a vector's capacity?",choices:["Released back to the OS","Unchanged — clear destroys elements but keeps the buffer","Halved","Reset to 16"],answer:1,explain:"Capacity never shrinks automatically. shrink_to_fit() is a non-binding request; the swap trick also works."},
{id:"s4",topic:"STL",lesson:8,q:"Which operation invalidates ALL iterators/pointers/references into a vector?",choices:["pop_back","Any reallocation (push past capacity, insert, reserve to larger)","Reading v[0]","swap with another vector"],answer:1,explain:"Reallocation moves the whole buffer, so everything pointing into it dangles. erase/pop_back only invalidate from the erased point onward."},
{id:"s5",topic:"STL",lesson:8,q:"Why would growing capacity by +1 each time make n push_backs O(n²)?",choices:["It wouldn't — it's still O(n)","Every push would trigger an O(current size) reallocation-and-copy","The allocator rejects small increments","Iterators would need rebuilding"],answer:1,explain:"Each push copies all existing elements: 1+2+3+...+n = O(n²). Geometric growth is what buys amortized O(1)."},
{id:"s6",topic:"STL",lesson:9,q:"What is Small String Optimization?",choices:["Compressing strings under 256 bytes","Storing short strings inline inside the string object, avoiding heap allocation","Interning duplicate strings","Using 16-bit characters for ASCII"],answer:1,explain:"Most strings are short; SSO keeps them in the object's own bytes (~15-22 chars typically). No allocator traffic for the common case."},
{id:"s7",topic:"STL",lesson:9,q:"Why doesn't moving an SSO string get the usual O(1) move benefit?",choices:["Strings can't be moved","Its data is inline in the object — there's no heap pointer to steal, so bytes must be copied","SSO strings are immutable","The standard forbids it"],answer:1,explain:"Move semantics' O(1) win comes from stealing a heap pointer. SSO data lives inside the object itself, so 'moving' still copies those inline bytes (cheap, but not a pointer steal)."},
{id:"s8",topic:"STL",lesson:10,q:"How does `std::unordered_map` handle hash collisions?",choices:["It rejects duplicate hashes","Chaining — each bucket holds a list of entries that hashed there","Rehashing on every collision","Linear probing"],answer:1,explain:"Standard library implementations use chaining. Open addressing (probing) is the other family — better locality, trickier deletion — used by many third-party maps."},
{id:"s9",topic:"STL",lesson:10,q:"When does `unordered_map` lookup degrade to O(n)?",choices:["When the map holds more than 2^16 entries","When all keys collide into one bucket (pathological or adversarial hashing)","After any rehash","When keys are strings"],answer:1,explain:"'O(1)' is average-case, contingent on a good hash and sane load factor. All-keys-one-bucket means scanning a single long chain."},
{id:"s10",topic:"STL",lesson:10,q:"What triggers a rehash, and what does it cost?",choices:["Every 100 insertions; O(1)","Load factor exceeding its max; O(n) to redistribute all elements into a bigger bucket array","Deleting any key; O(log n)","It never rehashes automatically"],answer:1,explain:"Same geometric-growth logic as vector: occasional O(n) reorganizations, amortized O(1) per insert. Rehashing invalidates iterators."},
{id:"s11",topic:"STL",lesson:11,q:"When would you pick `std::map` over `unordered_map`?",choices:["When you need faster average lookups","When you need sorted iteration or guaranteed O(log n) worst-case (no rehash latency spikes)","When keys are integers","map is always better"],answer:1,explain:"map's red-black tree gives ordering and predictable worst-case behavior — the latter matters in latency-sensitive systems where an occasional O(n) hiccup is unacceptable."},
{id:"s12",topic:"STL",lesson:11,q:"kth smallest key: `map` vs `unordered_map`?",choices:["Both O(1)","map: in-order walk, O(k); unordered_map: extract + sort everything, O(n log n)","unordered_map is faster — hash directly to the kth element","Both require full sorts"],answer:1,explain:"The tree is already sorted — walk it. The hash table never was — you must collect and sort all keys. Structure determines the answer."},
{id:"s13",topic:"STL",lesson:11,q:"How does `std::deque` achieve O(1) push at both ends AND O(1) random access?",choices:["It's a doubly linked list","Fixed-size chunks plus a map of chunk pointers; index math finds any element in two hops","It keeps two vectors back to back","It over-allocates a huge circular buffer"],answer:1,explain:"Segmented storage: push writes into an edge chunk (allocate a new one when full — nothing shifts); d[i] computes chunk = i/chunk_size, offset = i%chunk_size. A linked list could never give O(1) indexing."},
{id:"s14",topic:"STL",lesson:11,q:"Why is `vector` preferred over `deque` for sequential-scan-heavy workloads?",choices:["deque can't be iterated","vector's single contiguous block is more cache-friendly; deque hops between chunks","vector has a better API","deque is deprecated"],answer:1,explain:"deque's chunk boundaries break perfect contiguity, costing occasional pointer jumps and cache misses. Choose deque only when you truly need O(1) at both ends."},

/* ---- OS & Virtual Memory (L13,14) ---- */
{id:"o1",topic:"OS & Virtual Memory",lesson:13,q:"Two processes both use address 0x1000 without conflict. Why?",choices:["The OS forbids duplicate addresses","Each has its own virtual address space; page tables map the same virtual address to different physical frames","They time-share the address","0x1000 is a special shared region"],answer:1,explain:"Virtual memory gives every process the illusion of owning the whole address space. Per-process page tables translate to distinct physical frames — this is what memory isolation IS."},
{id:"o2",topic:"OS & Virtual Memory",lesson:13,q:"A program requests 8GB on a machine with 4GB RAM. What typically happens?",choices:["The allocation always fails immediately","Virtual address space is reserved; pages get physical backing on first touch, with swap as overflow","The OS compresses existing RAM","The program crashes at launch"],answer:1,explain:"Demand paging: virtual reservations aren't physical claims. Pages materialize when touched; cold pages can swap to disk. It works — just slowly if you actually touch it all."},
{id:"o3",topic:"OS & Virtual Memory",lesson:13,q:"Page fault vs segmentation fault?",choices:["Same thing, different OSes","Page fault: often-normal 'load this page' event; segfault: an invalid access that can't be resolved, escalated as SIGSEGV","Segfaults are recoverable, page faults aren't","Page faults only happen on disk reads"],answer:1,explain:"Page faults are how demand paging works — totally routine. A segfault is the subset where the access was genuinely invalid (null deref, writing read-only memory): no page can fix it."},
{id:"o4",topic:"OS & Virtual Memory",lesson:13,q:"What is the TLB?",choices:["A disk cache for swapped pages","A small hardware cache of recent virtual→physical translations, skipping page-table walks","The kernel's thread list","A buffer for network packets"],answer:1,explain:"Without it, every memory access would need a multi-level page-table walk. TLB hits make translation nearly free; misses are expensive."},
{id:"o5",topic:"OS & Virtual Memory",lesson:13,q:"How do you increase TLB hit rate?",choices:["Add more RAM","Improve access locality (contiguous structures) and use huge pages so each entry covers more memory","Disable virtual memory","Use more threads"],answer:1,explain:"Locality reuses cached translations; 2MB huge pages let the same TLB cover 512x the address space per entry. Both are real HFT techniques."},
{id:"o6",topic:"OS & Virtual Memory",lesson:14,q:"What do threads in one process share, and what's private?",choices:["Share everything including stacks","Share heap, globals, and code; each thread has its own stack and registers","Share only code","Nothing — that's what processes are for"],answer:1,explain:"Shared address space is what makes thread communication fast (plain memory) and dangerous (races). Private stacks keep their call chains separate."},
{id:"o7",topic:"OS & Virtual Memory",lesson:14,q:"Which is NOT an inter-process communication mechanism?",choices:["Pipes","Shared memory","Sockets","Direct reads of the other process's heap"],answer:3,explain:"Processes can't touch each other's memory by default — that isolation is the point of virtual address spaces. IPC (pipes, shared memory segments, sockets, signals, queues) exists precisely to bridge it."},
{id:"o8",topic:"OS & Virtual Memory",lesson:14,q:"Why is a process context switch costlier than a thread switch within one process?",choices:["Processes have more registers","Switching address spaces means page-table swap, TLB flush, and cache disruption; same-process threads share those","Thread switches don't save registers","It isn't costlier"],answer:1,explain:"Both save/restore execution state, but a new address space invalidates the TLB and disturbs caches. Threads share their process's page table — that's the cheapness."},
{id:"o9",topic:"OS & Virtual Memory",lesson:14,q:"Concurrency vs parallelism?",choices:["Synonyms","Concurrency = interleaving via time-slicing (fine on one core); parallelism = literally simultaneous execution on multiple cores","Parallelism is concurrency with locks","Concurrency requires multiple machines"],answer:1,explain:"A single core can be concurrent (rapid context switches create the illusion). True parallelism needs multiple cores doing work at the same instant. Modern systems do both."},
{id:"o10",topic:"OS & Virtual Memory",lesson:14,q:"How can a single-core computer appear to run many programs at once?",choices:["It can't","The scheduler rapidly context-switches between processes, each running for milliseconds at a time","Programs take turns per hour","Hyperthreading duplicates the core"],answer:1,explain:"Time-slicing: save one task's registers/PC, load another's, repeat fast enough that everything looks simultaneous. Context switches have real cost, which is why thrashing hurts."},

/* ---- Concurrency (L17,18,19) ---- */
{id:"c1",topic:"Concurrency",lesson:17,q:"Two threads each run `counter++` 1M times without synchronization. Final count?",choices:["Exactly 2,000,000","Exactly 1,000,000","Unpredictable, typically less than 2,000,000 — increments get lost","Compiler error"],answer:2,explain:"counter++ is LOAD/ADD/STORE. Interleavings where both threads load the same stale value lose updates. That's a race condition: results vary run to run."},
{id:"c2",topic:"Concurrency",lesson:17,q:"What is a race condition?",choices:["Two threads competing for CPU time","A bug where correctness depends on unpredictable interleaving of threads accessing shared data","When a thread runs too fast","A scheduling optimization"],answer:1,explain:"The hallmark: same code, different results across runs, because operations that look atomic in source are multiple interleaved machine steps."},
{id:"c3",topic:"Concurrency",lesson:17,q:"Why is `std::lock_guard` preferred over manual lock()/unlock()?",choices:["It's faster","RAII — the mutex unlocks automatically at scope exit, even if an exception is thrown","It can lock multiple mutexes","It spins instead of blocking"],answer:1,explain:"Manual unlock is missed on early returns and exceptions, deadlocking later lockers. lock_guard's destructor guarantees release on every path."},
{id:"c4",topic:"Concurrency",lesson:17,q:"Thread A holds mutex 1 and wants 2; thread B holds 2 and wants 1. This is:",choices:["A race condition","A livelock","A deadlock — commonly prevented by a consistent global lock-acquisition order","Priority inversion"],answer:2,explain:"Circular waiting, nobody proceeds. If every thread acquires locks in the same order (or uses std::lock to take both atomically), the cycle can't form."},
{id:"c5",topic:"Concurrency",lesson:17,q:"What problem do condition variables solve?",choices:["They make mutexes reentrant","Letting a thread sleep until a condition holds, instead of burning CPU busy-wait polling","They prevent deadlocks","They replace atomics"],answer:1,explain:"cv.wait releases the lock and sleeps; notify wakes it to recheck. That's why it needs unique_lock — the wait must unlock/relock internally."},
{id:"c6",topic:"Concurrency",lesson:18,q:"What makes `std::atomic<int>::fetch_add` different from `counter++` on a plain int?",choices:["It's syntactic sugar, same machine code","It compiles to an indivisible hardware instruction (e.g. LOCK XADD) — no thread ever sees it half-done","It takes a hidden mutex","It only works on one core"],answer:1,explain:"The hardware guarantees the read-modify-write happens as one step across all cores. No lost updates, no lock, no blocking."},
{id:"c7",topic:"Concurrency",lesson:18,q:"Describe Compare-And-Swap (CAS).",choices:["Swap two variables atomically","Atomically: if the value still equals what I expect, replace it; otherwise report failure so I can retry","Compare two threads' priorities","A mutex implementation detail"],answer:1,explain:"CAS is the optimistic primitive under lock-free programming: try, detect interference, retry. compare_exchange_strong in C++."},
{id:"c8",topic:"Concurrency",lesson:18,q:"Does `volatile` make an operation thread-safe in C++?",choices:["Yes — that's its purpose","Yes, but only for integers","No — it only prevents compiler optimization/reordering of accesses; no atomicity, no ordering guarantees","Only with -O0"],answer:2,explain:"The classic trap. volatile is for memory-mapped hardware and signal handlers. For threads you need std::atomic (or locks) — real atomicity plus memory-ordering semantics."},
{id:"c9",topic:"Concurrency",lesson:18,q:"When are atomics preferable to a mutex?",choices:["Always — mutexes are obsolete","For simple operations (counters, flags, single-word CAS) in hot paths, avoiding blocking and context switches","Whenever more than 2 threads exist","Only in kernel code"],answer:1,explain:"Atomics shine for small hot-path state. Mutexes remain right for larger critical sections — hand-rolled lock-free structures are notoriously hard to get correct."},
{id:"c10",topic:"Concurrency",lesson:19,q:"In a thread pool, why must a worker release the queue lock BEFORE running the task it popped?",choices:["The task might lock the same mutex","Holding it blocks all other enqueues/dequeues for the task's whole duration","Locks can't be held across function calls","To let the OS garbage-collect the lock"],answer:1,explain:"The lock protects the queue, not the work. Hold it only for the pop; run the task unlocked so the pool stays live. (A task locking the same mutex would also deadlock — but the general principle is never holding the queue lock during execution.)"},
{id:"c11",topic:"Concurrency",lesson:19,q:"Best structure for 'always run the soonest-scheduled task next'?",choices:["FIFO queue","Min-heap (priority queue) ordered by trigger time","Sorted linked list","Hash map keyed by time"],answer:1,explain:"A min-heap gives O(log n) insert and O(1) peek at the earliest task — exactly the access pattern a timed scheduler needs."},
{id:"c12",topic:"Concurrency",lesson:19,q:"How is cancellation typically implemented for tasks sitting in a scheduler's heap?",choices:["Binary search and remove the entry","A shared atomic flag checked just before firing — cancelled tasks are skipped (lazy cancellation)","Rebuild the heap on every cancel","Cancellation isn't possible with heaps"],answer:1,explain:"Heaps can't remove arbitrary elements efficiently. Flag-and-skip is O(1), and the dead entry just gets discarded when it surfaces."},
{id:"c13",topic:"Concurrency",lesson:19,q:"Why might a low-latency scheduler busy-poll instead of sleeping on a condition variable?",choices:["Condition variables are buggy","OS wake-up latency adds jitter; spinning trades CPU for predictable sub-millisecond reaction","Busy-polling saves power","Sleeping threads can't be woken"],answer:1,explain:"Waking a sleeping thread goes through the OS scheduler — microseconds to milliseconds of variance. HFT systems often pin a core and spin: a deliberate latency-vs-CPU tradeoff."},
{id:"c14",topic:"Concurrency",lesson:20,q:"Merging N sorted files too big for RAM: what's the memory footprint of the k-way merge?",choices:["O(total data)","O(N) — one buffered element per file plus the heap","O(N²)","O(largest file)"],answer:1,explain:"You only ever hold each file's current front element. That's the entire trick — memory scales with file count, not data size."},
{id:"c15",topic:"Concurrency",lesson:20,q:"After popping the minimum from the merge heap, what do you push next?",choices:["The next element from any random file","The next element from the SAME file the minimum came from","Nothing until the heap empties","The maximum, to rebalance"],answer:1,explain:"The heap must always represent every file's current front. Popping A's element means A's next element takes its place."},
{id:"c16",topic:"Concurrency",lesson:20,q:"To sort a single 100GB unsorted file with 8GB RAM:",choices:["Impossible without more RAM","Sort 8GB chunks in memory, write sorted runs to disk, then k-way merge the runs","Use a bigger hash map","Memory-map the file and quicksort it"],answer:1,explain:"External sort: chunk → in-memory sort → spill sorted runs → heap-merge. The same pattern underlies big-data frameworks."},

/* ---- Networking (L15,16) ---- */
{id:"n1",topic:"Networking",lesson:15,q:"How does TCP guarantee ordered, reliable delivery?",choices:["By sending each packet twice","Sequence numbers + receiver ACKs + retransmission on timeout + reordering at the receiver","By reserving network bandwidth","Routers guarantee it"],answer:1,explain:"Every byte is sequenced; unACKed data is resent; out-of-order segments are buffered and reordered before delivery. That machinery is exactly TCP's overhead vs UDP."},
{id:"n2",topic:"Networking",lesson:15,q:"TCP flow control vs congestion control?",choices:["Two names for one mechanism","Flow control protects the receiver (advertised buffer window); congestion control protects the network (sender self-throttles on inferred congestion)","Flow control is for UDP","Congestion control is receiver-driven"],answer:1,explain:"Asked as two separate questions specifically to catch conflation. Receiver window vs congestion window — different problems, different mechanisms."},
{id:"n3",topic:"Networking",lesson:15,q:"Why does market data typically ride UDP multicast rather than TCP?",choices:["UDP compresses better","One packet fans out to thousands of subscribers; TCP's per-connection, retransmit-and-block model can't scale that and adds head-of-line latency","Exchanges can't afford TCP","Multicast requires TLS"],answer:1,explain:"You can't maintain reliable point-to-point streams to every consumer of identical data, and a stale tick is better skipped than blocking behind a retransmission. Order entry, by contrast, needs reliability."},
{id:"n4",topic:"Networking",lesson:15,q:"What is the TCP three-way handshake?",choices:["SYN → SYN-ACK → ACK to establish a connection before data flows","Three retries before giving up","ACK → SYN → FIN","A checksum exchange"],answer:0,explain:"Both sides exchange initial sequence numbers and confirm before any payload. UDP has no equivalent — you just send."},
{id:"n5",topic:"Networking",lesson:15,q:"Which application would reasonably choose UDP?",choices:["Bank transfer processing","Live video streaming, where a lost frame is better skipped than waited for","File download","Sending trade orders with no reliability layer"],answer:1,explain:"UDP fits loss-tolerant, latency-sensitive traffic: streaming, DNS, game state, market data. Anything where every byte matters needs TCP or a reliable layer on top."},
{id:"n6",topic:"Networking",lesson:16,q:"How does traceroute discover the routers along a path?",choices:["It queries a global router registry","Sends packets with TTL=1,2,3...; each router that decrements TTL to 0 drops the packet and replies with ICMP Time Exceeded, identifying itself","Routers append their addresses to the packet","It pings every IP in the subnet"],answer:1,explain:"The TTL trick: routers tell on themselves, one hop per round. The mechanism is identical whether the probes are UDP, ICMP, or TCP."},
{id:"n7",topic:"Networking",lesson:16,q:"Why do socket programs call `htons()` on port numbers?",choices:["To encrypt the port","Network byte order is big-endian; x86 hosts are little-endian — htons converts","To compress the header","Ports must be hashed"],answer:1,explain:"Multi-byte protocol fields have a standard byte order on the wire. This is Lesson 2's endianness made practical — connecting the two is a strong interview move."},
{id:"n8",topic:"Networking",lesson:16,q:"On Linux, a socket is best described as:",choices:["A kernel thread","A file descriptor backed by the network stack — read/write/close apply","A reserved memory page","A hardware port on the NIC"],answer:1,explain:"The Unix 'everything is a file descriptor' model includes sockets. SOCK_STREAM = TCP, SOCK_DGRAM = UDP."},
{id:"n9",topic:"Networking",lesson:16,q:"In traceroute output, why does hop 1 usually respond fastest?",choices:["It has the least traffic","It's the nearest router — one TTL decrement away, shortest round trip","Later hops rate-limit","It's cached"],answer:1,explain:"TTL=1 dies at your gateway. Each subsequent probe travels further before expiring, so RTTs generally grow with hop number."},

/* ---- Performance (L22,23) ---- */
{id:"f1",topic:"Performance",lesson:22,q:"Iterating a vector<int> vs a list<int> of equal size — both O(n). Why is the vector often 10x+ faster in practice?",choices:["vector uses SIMD automatically","Contiguous memory: each 64-byte cache line fetch serves many elements; list nodes are scattered pointer-chases, each a likely cache miss","list is thread-safe, adding overhead","The compiler unrolls vector loops only"],answer:1,explain:"Big-O ignores constant factors; cache behavior IS the constant factor. This distinction is core to HFT interviews."},
{id:"f2",topic:"Performance",lesson:22,q:"What is a cache line?",choices:["A queue of pending cache requests","The fixed-size chunk (commonly 64 bytes) in which memory moves between RAM and caches","One row of L1","A CPU pipeline stage"],answer:1,explain:"Touching one byte pulls in its 64-byte neighborhood. Sequential access exploits this; scattered access wastes it."},
{id:"f3",topic:"Performance",lesson:22,q:"What is false sharing?",choices:["Two threads reading the same constant","Logically-independent variables used by different threads landing on the same cache line, causing constant cross-core invalidation","A race condition on shared data","Copy-on-write gone wrong"],answer:1,explain:"No correctness bug — the threads never touch each other's data — but every write invalidates the other core's copy of the line. Silent, brutal slowdown."},
{id:"f4",topic:"Performance",lesson:22,q:"How do you fix false sharing between two hot per-thread counters?",choices:["Use a mutex around both","alignas(64) padding so each counter owns its own cache line","Make them volatile","Move them to the heap"],answer:1,explain:"Give each hot variable its own line and the coherence ping-pong stops. Detect it with tools like perf c2c."},
{id:"f5",topic:"Performance",lesson:22,q:"Rank by typical access latency, fastest first:",choices:["RAM, L3, L2, L1, registers","Registers, L1, L2, L3, RAM","L1, registers, RAM, L2, L3","Registers, L3, L1, L2, RAM"],answer:1,explain:"Registers (~0), L1 (~4 cycles), L2 (~12), L3 (~40), RAM (~100-300). A RAM access costs hundreds of potential instructions — the hierarchy exists to hide that."},
{id:"f6",topic:"Performance",lesson:23,q:"Why is C++ (not Java) standard for latency-critical trading paths?",choices:["Java can't do networking","Deterministic resource management (RAII, no GC pauses) plus zero-cost abstractions compiling to bare-metal-equivalent code","C++ has more libraries","Java lacks threads"],answer:1,explain:"A GC pause in the hot path is an unbounded latency spike you can't schedule around. C++ frees deterministically and its abstractions compile away."},
{id:"f7",topic:"Performance",lesson:23,q:"An interviewer keeps asking 'why?' after each correct answer. What are they doing?",choices:["Stalling for time","Probing for the second level — testing whether you understand mechanisms or memorized conclusions","Trying to make you contradict yourself","Checking communication skills only"],answer:1,explain:"Every strong firm does this. The counter: volunteer the deeper level (tradeoffs, edge cases, implementation) before being asked."},
{id:"f8",topic:"Performance",lesson:23,q:"Which pairing best matches firm reputation to interview emphasis?",choices:["Jane Street: kernel internals; Jump: emplace_back trivia","Jane Street: deep C++ mechanics; HRT: broad systems; Citadel Sec: atomics/latency; Jump: Linux/kernel/CPU depth","All four ask identical questions","HRT: only algorithms"],answer:1,explain:"Directional, not gospel — verify per-desk with current reports. But allocating review time by these leans is smart strategy."},
{id:"f9",topic:"Performance",lesson:21,q:"Why do low-latency systems replace general-purpose `new`/`malloc` on hot paths?",choices:["malloc is deprecated","General allocators pay for arbitrary sizes/lifetimes/thread-safety — cost, fragmentation, and latency variance that pools/arenas avoid by specializing","new is not thread-safe","Custom allocators use less total RAM"],answer:1,explain:"Arenas bump a pointer; pools pop a free-list slot. Both are nanoseconds, fragmentation-free, and predictable — the general allocator can't promise any of that."},
{id:"f10",topic:"Performance",lesson:9,q:"Ticker symbols (~4-8 chars) are processed millions of times per second. Why does std::string still perform well?",choices:["The compiler interns them","SSO — short strings live inline in the object, so no heap allocation ever happens","Strings are cached by the OS","It doesn't — HFT firms ban std::string"],answer:1,explain:"SSO makes short-string creation/copying allocation-free. Knowing WHY the default tool is already fast (and when it isn't) is exactly the judgment interviews probe."}
];

const TOPICS = ["Memory", "Pointers & Language", "RAII & Move", "STL", "OS & Virtual Memory", "Concurrency", "Networking", "Performance"];

/* Deterministically shuffle each question's choices (seeded by question id)
   so correct answers are evenly spread across A/B/C/D. */
(function shuffleChoices() {
  QUESTIONS.forEach(q => {
    let seed = 0;
    for (let i = 0; i < q.id.length; i++) seed = (seed * 31 + q.id.charCodeAt(i)) >>> 0;
    const rand = () => { seed = (seed * 1664525 + 1013904223) >>> 0; return seed / 4294967296; };
    const idx = [0, 1, 2, 3];
    for (let i = idx.length - 1; i > 0; i--) {
      const j = Math.floor(rand() * (i + 1));
      [idx[i], idx[j]] = [idx[j], idx[i]];
    }
    q.choices = idx.map(i => q.choices[i]);
    q.answer = idx.indexOf(q.answer);
  });
})();

const LEVELS = [
  { name: "Intern", xp: 0 },
  { name: "Junior Dev", xp: 400 },
  { name: "Mid Level", xp: 1200 },
  { name: "Senior", xp: 2600 },
  { name: "Staff", xp: 4600 },
  { name: "Principal", xp: 7200 },
  { name: "Distinguished", xp: 10500 }
];

/* ================= STATE ================= */
const DEFAULT_STATE = {
  xp: 0,
  streak: 0,
  lastActiveDay: null,      // "YYYY-MM-DD" of last day a daily question was answered
  dailyAnswered: {},         // day -> {qid, correct}
  combo: 0,
  missed: {},                // qid -> {successesNeeded}
  history: {},               // qid -> {right, wrong}
  completedLessons: [],
  practiceIdx: {}            // topic -> next index (rotation)
};
let S = load();

function load() {
  try {
    const raw = localStorage.getItem("cppTrainerV1");
    if (raw) return Object.assign({}, DEFAULT_STATE, JSON.parse(raw));
  } catch (e) {}
  return JSON.parse(JSON.stringify(DEFAULT_STATE));
}
function save() { try { localStorage.setItem("cppTrainerV1", JSON.stringify(S)); } catch (e) {} }

function todayStr() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function daysBetween(a, b) {
  return Math.round((new Date(b) - new Date(a)) / 86400000);
}

/* ================= XP / LEVELS ================= */
function levelInfo() {
  let cur = LEVELS[0], next = null;
  for (let i = 0; i < LEVELS.length; i++) {
    if (S.xp >= LEVELS[i].xp) { cur = LEVELS[i]; next = LEVELS[i+1] || null; }
  }
  const base = cur.xp, top = next ? next.xp : cur.xp;
  const pct = next ? Math.min(100, Math.round(100 * (S.xp - base) / (top - base))) : 100;
  return { cur, next, pct };
}
function awardXP(amount, label) {
  S.xp += amount;
  save();
  const t = document.createElement("div");
  t.className = "toast";
  t.textContent = "+" + amount + " XP" + (label ? " · " + label : "");
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 1800);
}

/* ================= DAILY QUESTION ================= */
function hashStr(s) {
  let h = 2166136261;
  for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
  return Math.abs(h);
}
function dailyQuestion() {
  const day = todayStr();
  // Deterministic pick: rotate through the bank by day, offset by hash so it doesn't start at q0
  const idx = hashStr(day) % QUESTIONS.length;
  return QUESTIONS[idx];
}

/* ================= SPACED REPETITION ================= */
function recordAnswer(q, correct) {
  if (!S.history[q.id]) S.history[q.id] = { right: 0, wrong: 0 };
  if (correct) {
    S.history[q.id].right++;
    S.combo++;
    if (S.missed[q.id]) {
      S.missed[q.id].successesNeeded--;
      if (S.missed[q.id].successesNeeded <= 0) delete S.missed[q.id];
    }
  } else {
    S.history[q.id].wrong++;
    S.combo = 0;
    S.missed[q.id] = { successesNeeded: 2 };
  }
  save();
}
function reviewQueue() {
  return Object.keys(S.missed).map(id => QUESTIONS.find(q => q.id === id)).filter(Boolean);
}

/* ================= RENDER HELPERS ================= */
const app = document.getElementById("app");
let view = "today";
let viewArg = null;

function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fmt(s) {
  // escape, then restore `code` spans
  return esc(s).replace(/`([^`]+)`/g, "<code>$1</code>");
}
function headerHTML() {
  return `<div class="header">
    <div class="logo">C++<span>Quant</span></div>
    <div class="stats">
      <div class="stat streak">&#128293; ${S.streak}</div>
      <div class="stat xp">&#9889; ${S.xp}</div>
    </div>
  </div>`;
}
function levelbarHTML() {
  const li = levelInfo();
  const nextTxt = li.next ? (li.next.xp - S.xp) + " XP to " + li.next.name : "Max level!";
  return `<div class="card">
    <div class="tag gold">Engineering level</div>
    <div style="display:flex;justify-content:space-between;align-items:baseline;">
      <div style="font-weight:800;font-size:20px;">${li.cur.name}</div>
      <div class="muted" style="font-size:12px;">${nextTxt}</div>
    </div>
    <div class="levelbar"><div class="progress-track"><div class="progress-fill" style="width:${li.pct}%"></div></div></div>
  </div>`;
}

/* ================= QUESTION WIDGET ================= */
// mode: "daily" | "practice" | "review"
function questionHTML(q, mode) {
  return `<div class="card" id="qcard" data-qid="${q.id}" data-mode="${mode}">
    <div class="tag">${q.topic}</div>
    <div class="question-text">${fmt(q.q)}</div>
    <div class="choices">
      ${q.choices.map((c, i) => `
        <button class="choice" data-i="${i}">
          <span class="letter">${"ABCD"[i]}</span><span>${fmt(c)}</span>
        </button>`).join("")}
    </div>
    <div id="explain-slot"></div>
    <div id="next-slot"></div>
  </div>`;
}

function attachQuestionHandlers(q, mode, onDone) {
  const card = document.getElementById("qcard");
  card.querySelectorAll(".choice").forEach(btn => {
    btn.addEventListener("click", () => {
      const i = parseInt(btn.dataset.i, 10);
      const correct = i === q.answer;

      card.querySelectorAll(".choice").forEach((b, j) => {
        b.disabled = true;
        if (j === q.answer) b.classList.add("correct");
        else if (j === i && !correct) b.classList.add("wrong");
        else b.classList.add("dim");
      });

      recordAnswer(q, correct);

      let xp = 0;
      if (correct) {
        if (mode === "daily") xp = 25;
        else if (mode === "review") xp = 15;
        else xp = 10;
        const comboBonus = Math.min(15, Math.max(0, (S.combo - 1) * 2));
        xp += comboBonus;
        awardXP(xp, S.combo > 1 ? S.combo + " combo!" : null);
      }

      if (mode === "daily") {
        const day = todayStr();
        S.dailyAnswered[day] = { qid: q.id, correct };
        // streak logic
        if (S.lastActiveDay === null) S.streak = 1;
        else {
          const gap = daysBetween(S.lastActiveDay, day);
          if (gap === 1) S.streak++;
          else if (gap > 1) S.streak = 1;
        }
        S.lastActiveDay = day;
        save();
      }

      const slot = document.getElementById("explain-slot");
      slot.innerHTML = `<div class="explain ${correct ? "good" : "bad"}">
        <div class="verdict">${correct ? "✓ Correct" + (S.combo > 1 ? '<span class="combo-badge">' + S.combo + ' in a row</span>' : "") : "✗ Not quite — answer: " + "ABCD"[q.answer]}</div>
        ${fmt(q.explain)}
        ${!correct ? '<div class="muted" style="margin-top:8px;">Added to your Review queue — answer it correctly twice to clear it.</div>' : ""}
      </div>`;

      const nextSlot = document.getElementById("next-slot");
      if (onDone) onDone(correct, nextSlot);
      // refresh header stats
      document.querySelector(".stats").innerHTML =
        `<div class="stat streak">&#128293; ${S.streak}</div><div class="stat xp">&#9889; ${S.xp}</div>`;
    });
  });
}

/* ================= VIEWS ================= */
function renderToday() {
  const day = todayStr();
  const done = S.dailyAnswered[day];
  const q = dailyQuestion();
  let html = headerHTML() + levelbarHTML();

  if (done) {
    const wasCorrect = done.correct;
    html += `<div class="card">
      <div class="tag green">Today's question</div>
      <h2>${wasCorrect ? "✓ Nailed it." : "Done for today."}</h2>
      <p class="muted" style="margin-top:6px;">You've answered today's question${wasCorrect ? " correctly" : ""}. Come back tomorrow to keep your streak going — or hit Practice for more reps${Object.keys(S.missed).length ? ", or clear your Review queue" : ""}.</p>
      <button class="btn secondary" onclick="go('practice')">Practice more questions</button>
      ${Object.keys(S.missed).length ? `<button class="btn" onclick="go('review')">Review ${Object.keys(S.missed).length} missed question${Object.keys(S.missed).length>1?"s":""}</button>` : ""}
    </div>`;
  } else {
    html += `<div class="card" style="padding:0;border:none;background:none;margin-bottom:0;">
      <div class="tag green" style="margin-left:4px;">Today's question · +25 XP</div>
    </div>`;
    html += questionHTML(q, "daily");
  }

  // Suggested lesson for today (next uncompleted)
  const next = LESSONS.find(l => !S.completedLessons.includes(l.id));
  if (next) {
    html += `<div class="card">
      <div class="tag blue">Up next in your plan · Week ${next.week}</div>
      <h2>${next.title}</h2>
      <p class="muted">${next.teaser}</p>
      <button class="btn secondary" onclick="go('lesson', ${next.id})">Start lesson</button>
    </div>`;
  }
  app.innerHTML = html;
  if (!done) attachQuestionHandlers(q, "daily", () => {});
}

function renderLessons() {
  let html = headerHTML();
  html += `<div class="card" style="margin-bottom:4px;">
    <h2>10-Week Study Plan</h2>
    <p class="muted">The compressed Bible, stretched to a saner 2.5-month pace. ${S.completedLessons.length}/${LESSONS.length} lessons complete. Finish a lesson's quiz to mark it done.</p>
  </div>`;
  let lastWeek = null;
  LESSONS.forEach(l => {
    if (l.week !== lastWeek) { html += `<div class="week-label">Week ${l.week} — ${l.weekTheme}</div>`; lastWeek = l.week; }
    const done = S.completedLessons.includes(l.id);
    html += `<button class="lesson-row ${done ? "done" : ""}" onclick="go('lesson', ${l.id})">
      <span class="num">${done ? "✓" : l.id}</span>
      <span class="info"><div class="title">${l.title}</div><div class="sub">${l.topic}</div></span>
    </button>`;
  });
  app.innerHTML = html;
}

function deepDiveHTML(lessonId) {
  const d = DEEPDIVE[lessonId];
  if (!d) return "";
  return `<div class="deepdive">
    <div class="dd-head">Go deeper ↗</div>
    <div class="dd-note">${d.note}</div>
    ${d.links.map(([label, url]) =>
      `<a class="dd-link" href="${url}" target="_blank" rel="noopener noreferrer">
        <span>${label}</span><span class="arrow">↗</span>
      </a>`).join("")}

}

function renderLesson(id) {
  const l = LESSONS.find(x => x.id === id);
  if (!l) return go("lessons");
  const done = S.completedLessons.includes(l.id);
  let html = headerHTML();
  html += `<button class="backlink" onclick="go('lessons')">&larr; All lessons</button>`;
  html += `<div class="card">
    <div class="tag">Week ${l.week} · ${l.topic}</div>
    <h2 style="font-size:22px;margin-bottom:14px;">${l.title}</h2>
    <div class="lesson-body">${l.body}</div>
    <h3>Key points</h3>
    <ul class="keypoints">${l.keyPoints.map(k => "<li>" + fmt(k) + "</li>").join("")}</ul>
    ${deepDiveHTML(l.id)}
    ${done
      ? `<div class="tag green" style="margin-top:8px;">✓ Completed</div>
         <button class="btn" onclick="startLessonQuiz(${l.id})">Retake quiz</button>
         <button class="btn secondary" onclick="go('answers', ${l.id})">Review answers</button>`
      : `<button class="btn" onclick="startLessonQuiz(${l.id})">Take the quiz</button>
         ${lessonAnswered(l.id) ? `<button class="btn secondary" onclick="go('answers', ${l.id})">Review answers</button>` : ""}`}
  </div>`;
  app.innerHTML = html;
  window.scrollTo(0, 0);
}

// Has the user answered at least one question tied to this lesson?
function lessonAnswered(lessonId) {
  return QUESTIONS.some(q => q.lesson === lessonId && S.history[q.id]);
}

// Review view: every question in a lesson, with the correct answer,
// explanation, and the user's own track record revealed.
function renderAnswers(lessonId) {
  const l = LESSONS.find(x => x.id === lessonId);
  if (!l) return go("lessons");
  const qs = QUESTIONS.filter(q => q.lesson === lessonId);
  let html = headerHTML();
  html += `<button class="backlink" onclick="go('lesson', ${lessonId})">&larr; Back to lesson</button>`;
  html += `<div class="card" style="padding:14px 20px;">
    <div class="tag blue" style="margin:0;">Review answers · ${l.title}</div>
    <p class="muted" style="margin-top:8px;">Every question for this lesson, with the correct answer and your track record. Study these, then hit Retake quiz.</p>
  </div>`;
  qs.forEach((q, n) => {
    const h = S.history[q.id];
    const record = h
      ? `<span style="color:var(--green);font-weight:700;">${h.right}✓</span> · <span style="color:var(--red);font-weight:700;">${h.wrong}✗</span>`
      : `<span class="muted">not attempted yet</span>`;
    html += `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;">
        <span class="tag" style="margin:0;">Q${n + 1} · ${q.topic}</span>
        <span style="font-size:13px;">${record}</span>
      </div>
      <div class="question-text" style="margin-bottom:12px;">${fmt(q.q)}</div>
      <div class="choices">
        ${q.choices.map((c, i) => `
          <div class="choice ${i === q.answer ? "correct" : "dim"}" style="cursor:default;">
            <span class="letter">${"ABCD"[i]}</span><span>${fmt(c)}</span>
          </div>`).join("")}
      </div>
      <div class="explain good" style="margin-top:12px;">
        <div class="verdict">Answer: ${"ABCD"[q.answer]}</div>${fmt(q.explain)}
      </div>
    </div>`;
  });
  html += `<button class="btn" onclick="startLessonQuiz(${lessonId})">Retake quiz</button>`;
  app.innerHTML = html;
  window.scrollTo(0, 0);
}

let quizState = null;
function startLessonQuiz(lessonId) {
  const pool = QUESTIONS.filter(q => q.lesson === lessonId);
  const qs = shuffle(pool.slice()).slice(0, 3);
  if (qs.length === 0) { // fallback: same-topic questions
    const l = LESSONS.find(x => x.id === lessonId);
    qs.push(...shuffle(QUESTIONS.filter(q => q.topic === l.topic)).slice(0, 3));
  }
  quizState = { lessonId, qs, idx: 0, correct: 0 };
  view = "quiz";
  renderQuiz();
}
function renderQuiz() {
  const { qs, idx, lessonId } = quizState;
  const q = qs[idx];
  let html = headerHTML();
  html += `<button class="backlink" onclick="go('lesson', ${lessonId})">&larr; Back to lesson</button>`;
  html += `<div class="muted" style="margin-bottom:10px;font-weight:700;">Question ${idx+1} of ${qs.length}</div>`;
  html += questionHTML(q, "practice");
  app.innerHTML = html;
  window.scrollTo(0, 0);
  attachQuestionHandlers(q, "practice", (correct, nextSlot) => {
    if (correct) quizState.correct++;
    if (idx + 1 < qs.length) {
      nextSlot.innerHTML = `<button class="btn" id="nextq">Next question</button>`;
      document.getElementById("nextq").onclick = () => { quizState.idx++; renderQuiz(); };
    } else {
      const passed = quizState.correct >= Math.ceil(qs.length * 0.67);
      nextSlot.innerHTML = `<button class="btn" id="finishq">${passed ? "Finish — mark lesson complete" : "Finish"}</button>`;
      document.getElementById("finishq").onclick = () => {
        if (passed && !S.completedLessons.includes(lessonId)) {
          S.completedLessons.push(lessonId);
          save();
          awardXP(40, "Lesson complete!");
        }
        go("lesson", lessonId);
      };
    }
  });
}

let practiceState = { topic: null };
function renderPractice() {
  let html = headerHTML();
  html += `<div class="card">
    <h2>Practice</h2>
    <p class="muted">Unlimited reps, +10 XP per correct answer (combo bonuses stack). Pick a topic or go random.</p>
    <div class="topic-select">
      <button class="topic-btn ${practiceState.topic === null ? "active" : ""}" onclick="setTopic(null)">All topics</button>

    </div>
    <button class="btn" onclick="nextPractice()">Start</button>
  </div>`;

}
function setTopic(t) { practiceState.topic = t; renderPractice(); }
function nextPractice() {
  const pool = practiceState.topic ? QUESTIONS.filter(q => q.topic === practiceState.topic) : QUESTIONS;
  // prefer least-seen questions
  const sorted = shuffle(pool.slice()).sort((a, b) => seenCount(a) - seenCount(b));
  const q = sorted[0];
  let html = headerHTML();
  html += `<button class="backlink" onclick="go('practice')">&larr; Topics</button>`;
  html += questionHTML(q, "practice");

  attachQuestionHandlers(q, "practice", (correct, nextSlot) => {
    nextSlot.innerHTML = `<button class="btn" id="nextq">Next question</button>`;
    document.getElementById("nextq").onclick = nextPractice;
  });
}
function seenCount(q) { const h = S.history[q.id]; return h ? h.right + h.wrong : 0; }

function renderReview() {
  const queue = reviewQueue();

  if (queue.length === 0) {

}

function renderProfile() {
  const li = levelInfo();
  const totalAnswered = Object.values(S.history).reduce((s, h) => s + h.right + h.wrong, 0);

  const topicStats = TOPICS.map(t => {

/* ================= AI TUTOR ================= */
let aiState = null;  // { lessonId, messages: [{role, content}] }

function getApiKey() { try { return localStorage.getItem("geminiApiKey") || ""; } catch(e) { return ""; } }
function setApiKey(k) { try { localStorage.setItem("geminiApiKey", k); } catch(e) {} }

// Strip a lesson's HTML down to readable plain text for context.
function lessonPlainText(l) {
  let t = l.body
    .replace(/<pre>/g, "\n```\n").replace(/<\/pre>/g, "\n```\n")
    .replace(/<h3>/g, "\n## ").replace(/<\/h3>/g, "\n")
    .replace(/<li>/g, "\n- ").replace(/<[^>]+>/g, "")
    .replace(/&lt;/g, "<").replace(/&gt;/g, ">").replace(/&amp;/g, "&");
  return l.title + "\n\n" + t.replace(/\n{3,}/g, "\n\n").trim();
}

// Minimal markdown → HTML for AI replies (code blocks, inline code, bold).
function fmtAI(s) {
  const blocks = [];
  let h = s.replace(/```[a-zA-Z]*\n?([\s\S]*?)```/g, (m, c) => {
    blocks.push(c.replace(/\n+$/, "")); return "" + (blocks.length - 1) + "";
  });
  h = h.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  h = h.replace(/`([^`]+)`/g, "<code>$1</code>");
  h = h.replace(/\*\*([^*]+)\*\*/g, "<b>$1</b>");
  h = h.replace(/\n/g, "<br>");
  h = h.replace(/(\d+)/g, (m, i) =>
    "<pre>" + blocks[i].replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") + "</pre>");
  return h;
}

// Chat pane size: index into SIZES. Bigger chat = smaller lesson, and vice versa.
const AI_SIZES = [{ w: "34%", h: "34vh" }, { w: "48%", h: "48vh" }, { w: "72%", h: "74vh" }];
let aiSize = 1;
function applyAISize() {
  const s = AI_SIZES[aiSize];
  document.body.style.setProperty("--chat-w", s.w);
  document.body.style.setProperty("--chat-h", s.h);
}
function aiResize(delta) {
  aiSize = Math.max(0, Math.min(AI_SIZES.length - 1, aiSize + delta));
  applyAISize();
  scrollAIToBottom();
}

function openAI(lessonId) {
  const l = LESSONS.find(x => x.id === lessonId);
  if (!l) return;
  if (!aiState || aiState.lessonId !== lessonId) aiState = { lessonId, messages: [] };
  applyAISize();
  document.body.classList.add("ai-open");
  document.getElementById("aiFab").style.display = "none";
  renderAI();
}
function closeAI() {
  document.body.classList.remove("ai-open");
  // Restore the Ask-AI button if we're still on a lesson.
  document.getElementById("aiFab").style.display = (view === "lesson") ? "flex" : "none";
}

function renderAI() {
  const l = LESSONS.find(x => x.id === aiState.lessonId);
  const ov = document.getElementById("aiOverlay");
  const hasKey = !!getApiKey();

  let inner = `<div class="ai-head">

      <button class="ai-x" onclick="aiResize(-1)" title="Smaller chat (bigger lesson)">&minus;</button>
      <button class="ai-x" onclick="aiResize(1)" title="Bigger chat (smaller lesson)">+</button>
      <button class="ai-x" onclick="closeAI()" title="Close">&times;</button>
    </div>`;

  if (!hasKey) {
    inner += `<div class="ai-setup">

      <p class="muted">The tutor answers using Google's <b>Gemini</b>, which has a genuinely free API tier — plenty for studying. It runs with <b>your own</b> Google API key, stored only in this browser (never sent anywhere except Google).</p>
      <h3>Get a free key (2 min)</h3>
      <p class="muted">Go to <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener noreferrer" style="color:var(--blue);">aistudio.google.com/apikey</a> → sign in with your Google account → Create API key. It starts with <code>AQ.</code> (newer keys) or <code>AIza</code> (older). Paste it here:</p>
      <input class="key-input" id="aiKeyInput" type="password" placeholder="AQ... or AIza..." autocomplete="off">

  }

  inner += `<div class="ai-msgs" id="aiMsgs">`;

      <div class="ai-chips">

        <button class="ai-chip" onclick="aiChip('Walk through the main code example in this lesson line by line.')">Break down the code</button>
        <button class="ai-chip" onclick="aiChip('Give me one more concrete example for this topic.')">Another example</button>
        <button class="ai-chip" onclick="aiChip('How would this show up in a quant/HFT interview, and what is the ideal answer?')">Why it matters for interviews</button>
      </div>`;
  } else {
    aiState.messages.forEach(m => {
      inner += `<div class="ai-msg ${m.role === "user" ? "user" : "bot"}">${m.role === "user" ? m.content.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;") : fmtAI(m.content)}</div>`;
    });
  }

    </div>`;
  ov.innerHTML = inner;

  if (input) {
    input.addEventListener("input", () => { input.style.height = "auto"; input.style.height = Math.min(120, input.scrollHeight) + "px"; });

function scrollAIToBottom() { const m = document.getElementById("aiMsgs"); if (m) m.scrollTop = m.scrollHeight; }

function saveKeyFromInput() {
  const v = document.getElementById("aiKeyInput").value.trim();
  // Google Gemini keys: older "Standard" keys start with AIza, newer
  // "Auth" keys (2026+) start with AQ. Accept both.
  if (!(v.startsWith("AIza") || v.startsWith("AQ"))) {
    document.getElementById("aiKeyErr").textContent = "That doesn't look like a Google API key (should start with AIza or AQ).";
    return;
  }
  setApiKey(v);
  renderAI();
}

function aiChip(text) { document.getElementById("aiInput") ? (document.getElementById("aiInput").value = text) : null; sendAI(text); }

async function sendAI(preset) {
  const input = document.getElementById("aiInput");
  const question = (preset !== undefined ? preset : (input ? input.value : "")).trim();
  if (!question) return;
  const sendBtn = document.getElementById("aiSend");
  if (sendBtn) sendBtn.disabled = true;

  aiState.messages.push({ role: "user", content: question });
  if (input) { input.value = ""; input.style.height = "auto"; }
  renderAI();

  const msgs = document.getElementById("aiMsgs");
  const thinking = document.createElement("div");
  thinking.className = "ai-msg bot thinking";
  thinking.textContent = "Thinking…";
  msgs.appendChild(thinking);
  scrollAIToBottom();

  const l = LESSONS.find(x => x.id === aiState.lessonId);
  const system = `You are a patient, encouraging C++ tutor inside a study app. The student is strong in Python but a relative beginner in C++, preparing for C++ software-engineer interviews at quant/HFT firms (Jane Street, Citadel Securities, HRT, Jump Trading). They are currently reading this lesson:\n\n<lesson>\n${lessonPlainText(l)}\n</lesson>\n\nAnswer their questions about this material clearly and concisely. Always define jargon in plain language. Use short, correct C++ snippets when they help. Lead with intuition, then precision. Keep answers focused — a few short paragraphs unless they ask for more depth. If a question is unrelated to C++/systems/interview prep, answer briefly and steer back to the lesson.`;

  try {
    const reply = await callGemini(system, aiState.messages);
    aiState.messages.push({ role: "assistant", content: reply });
  } catch (err) {
    let msg = "Something went wrong. ";
    const t = String(err && err.message || err);
    if (t.includes("400") || t.includes("403") || t.toUpperCase().includes("API_KEY")) msg += "Your API key was rejected — re-check it in the Me tab.";
    else if (t.includes("429")) msg += "Free-tier rate limit hit — wait a minute and try again.";
    else if (t.toLowerCase().includes("failed to fetch")) msg += "Network issue — check your connection (the tutor needs internet).";
    else msg += t.slice(0, 200);
    aiState.messages.push({ role: "assistant", content: msg });
  }
  if (sendBtn) sendBtn.disabled = false;
  renderAI();
}

// Google retires specific model versions periodically. We try current
// models in order and remember the first that works, so the app keeps
// running as names change. "-latest" aliases are the most future-proof.
const GEMINI_MODELS = ["gemini-flash-latest", "gemini-3-flash", "gemini-2.5-flash-lite", "gemini-2.5-flash"];

async function callGemini(system, messages) {
  const body = JSON.stringify({
    systemInstruction: { parts: [{ text: system }] },
    contents: messages.map(m => ({
      role: m.role === "assistant" ? "model" : "user",  // Gemini uses "model"
      parts: [{ text: m.content }]
    })),
    generationConfig: { maxOutputTokens: 1024 }
  });

  // Try a previously-working model first, then the rest.
  let stored = ""; try { stored = localStorage.getItem("geminiModel") || ""; } catch (e) {}
  const order = stored ? [stored].concat(GEMINI_MODELS.filter(m => m !== stored)) : GEMINI_MODELS.slice();

  let lastErr = "no model available";
  for (const model of order) {
    const res = await fetch(
      "https://generativelanguage.googleapis.com/v1beta/models/" + model + ":generateContent",
      { method: "POST", headers: { "content-type": "application/json", "x-goog-api-key": getApiKey() }, body }
    );
    if (res.ok) {
      try { localStorage.setItem("geminiModel", model); } catch (e) {}
      const data = await res.json();
      const cand = data.candidates && data.candidates[0];
      const text = cand && cand.content && cand.content.parts && cand.content.parts.map(p => p.text || "").join("");
      return text || "(empty response)";
    }
    const errText = (await res.text()).slice(0, 300);
    // Model missing/retired/unavailable → try the next candidate.
    if (res.status === 404 || /not (found|available)|unsupported|does not exist/i.test(errText)) { lastErr = res.status + " " + errText; continue; }
    // Real problem (bad key, rate limit, quota) → stop and report it.
    throw new Error(res.status + " " + errText);
  }
  throw new Error("404 " + lastErr);
}

/* ================= NAV ================= */
function go(v, arg) {
  view = v; viewArg = arg;
  document.body.classList.remove("ai-open");  // close the chat pane on any navigation
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active",
    t.dataset.view === v || (["lesson","quiz","answers"].includes(v) && t.dataset.view === "lessons")));
  if (v === "today") renderToday();
  else if (v === "lessons") renderLessons();
  else if (v === "lesson") renderLesson(arg);
  else if (v === "answers") renderAnswers(arg);
  else if (v === "practice") renderPractice();
  else if (v === "review") renderReview();
  else if (v === "profile") renderProfile();
  // Ask-AI floating button: show only while reading a lesson.
  const fab = document.getElementById("aiFab");
  if (v === "lesson") { fab.style.display = "flex"; fab.dataset.lesson = arg; }
  else fab.style.display = "none";
  window.scrollTo(0, 0);
}
document.querySelectorAll(".tab").forEach(t => t.addEventListener("click", () => go(t.dataset.view)));
document.getElementById("aiFab").addEventListener("click", function () { openAI(parseInt(this.dataset.lesson, 10)); });

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}

/* streak decay check on load: if user skipped >1 day, streak resets visually */
(function checkStreak() {
  if (S.lastActiveDay) {
    const gap = daysBetween(S.lastActiveDay, todayStr());
    if (gap > 1) { S.streak = 0; save(); }
  }
})();
